<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 2400" width="1080" height="2400">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F5F1EA"/>
      <stop offset="1" stop-color="#E4ECE7" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="soft2" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1080" height="2400" fill="url(#bg2)"/>

  <!-- Headline copy -->
  <text x="540" y="200" font-family="Georgia,serif" font-size="62" font-weight="500" fill="#181818" text-anchor="middle" letter-spacing="-1">A shift summary that</text>
  <text x="540" y="270" font-family="Georgia,serif" font-size="62" font-weight="500" fill="#6B8E78" text-anchor="middle" letter-spacing="-1">respects your time.</text>
  <text x="540" y="330" font-family="system-ui,sans-serif" font-size="26" fill="#7C7570" text-anchor="middle">For the drivers behind every route.</text>

  <!-- Device frame -->
  <g transform="translate(120,420)">
    <rect width="840" height="1740" rx="64" fill="#1A1614" filter="url(#soft2)" opacity="0.18"/>
    <rect width="840" height="1740" rx="56" fill="#FAF7F2" stroke="#E5DFD3" stroke-width="2"/>

    <!-- Top bar -->
    <rect x="0" y="0" width="840" height="100" rx="56" fill="#FAF7F2"/>
    <rect x="0" y="60" width="840" height="40" fill="#FAF7F2"/>
    <line x1="0" y1="100" x2="840" y2="100" stroke="#E5DFD3"/>
    <text x="420" y="62" font-family="system-ui,sans-serif" font-size="22" font-weight="600" fill="#181818" text-anchor="middle">ملخّص الرحلة</text>

    <!-- Eyebrow -->
    <text x="40" y="180" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#C96442" letter-spacing="3">انتهت الرحلة</text>

    <!-- Big serif number -->
    <text x="40" y="380" font-family="Georgia,serif" font-size="220" font-weight="500" fill="#6B3D24" letter-spacing="-6">47</text>
    <text x="290" y="380" font-family="system-ui,sans-serif" font-size="36" font-weight="500" fill="#4A4644">راكب</text>

    <!-- Subhead -->
    <text x="40" y="448" font-family="system-ui,sans-serif" font-size="26" font-weight="600" fill="#181818">خط ١٢ · مزة → باب توما</text>
    <text x="40" y="494" font-family="system-ui,sans-serif" font-size="22" fill="#7C7570">استمرت الرحلة 42 د وقطعت 8.4 كم</text>

    <!-- Spec list -->
    <g transform="translate(40,540)">
      <rect width="760" height="420" rx="22" fill="#FAF7F2" stroke="#E5DFD3"/>
      <!-- Row 1 -->
      <text x="32" y="60" font-family="system-ui,sans-serif" font-size="22" fill="#4A4644" font-weight="500">المسافة</text>
      <text x="728" y="60" font-family="system-ui,sans-serif" font-size="22" font-weight="600" fill="#181818" text-anchor="end">8.4 كم</text>
      <line x1="32" y1="86" x2="728" y2="86" stroke="#E5DFD3"/>
      <!-- Row 2 -->
      <text x="32" y="138" font-family="system-ui,sans-serif" font-size="22" fill="#4A4644" font-weight="500">المدة</text>
      <text x="728" y="138" font-family="system-ui,sans-serif" font-size="22" font-weight="600" fill="#181818" text-anchor="end">42 د</text>
      <line x1="32" y1="164" x2="728" y2="164" stroke="#E5DFD3"/>
      <!-- Row 3 -->
      <text x="32" y="216" font-family="system-ui,sans-serif" font-size="22" fill="#4A4644" font-weight="500">الذروة</text>
      <text x="728" y="216" font-family="system-ui,sans-serif" font-size="22" font-weight="600" fill="#181818" text-anchor="end">38 كم/س</text>
      <line x1="32" y1="242" x2="728" y2="242" stroke="#E5DFD3"/>
      <!-- Row 4 -->
      <text x="32" y="294" font-family="system-ui,sans-serif" font-size="22" fill="#4A4644" font-weight="500">الالتزام بالموعد</text>
      <text x="728" y="294" font-family="system-ui,sans-serif" font-size="22" font-weight="600" fill="#4A8060" text-anchor="end">94%</text>
      <line x1="32" y1="320" x2="728" y2="320" stroke="#E5DFD3"/>
      <!-- Row 5 -->
      <text x="32" y="372" font-family="system-ui,sans-serif" font-size="22" fill="#4A4644" font-weight="500">حوادث</text>
      <text x="728" y="372" font-family="system-ui,sans-serif" font-size="22" font-weight="600" fill="#4A8060" text-anchor="end">لا شيء</text>
    </g>

    <!-- Reflective copy -->
    <g transform="translate(40,1000)">
      <rect width="760" height="200" rx="22" fill="#FBE7DB" fill-opacity="0.6" stroke="#F6D4C2"/>
      <text x="32" y="60" font-family="Georgia,serif" font-style="italic" font-size="26" fill="#6B3D24">أداء ممتاز — وصلت في</text>
      <text x="32" y="100" font-family="Georgia,serif" font-style="italic" font-size="26" fill="#6B3D24">الموعد لمعظم المحطات.</text>
      <text x="32" y="140" font-family="Georgia,serif" font-style="italic" font-size="26" fill="#6B3D24">أحسنت.</text>
      <text x="32" y="180" font-family="system-ui,sans-serif" font-size="18" fill="#7C7570">— نقل دمشق</text>
    </g>

    <!-- CTA -->
    <g transform="translate(40,1240)">
      <rect width="760" height="100" rx="50" fill="#C96442"/>
      <text x="380" y="62" font-family="system-ui,sans-serif" font-size="26" font-weight="600" fill="#FFF8F3" text-anchor="middle">انتهيت</text>
    </g>
    <text x="420" y="1410" font-family="system-ui,sans-serif" font-size="20" fill="#7C7570" text-anchor="middle">تنزيل سجل الرحلة</text>

    <!-- Trip ID footer -->
    <text x="420" y="1620" font-family="system-ui,sans-serif" font-size="16" fill="#7C7570" text-anchor="middle">رقم الرحلة · trip-2026-05-24-0117</text>
  </g>

  <text x="540" y="2280" font-family="system-ui,sans-serif" font-size="22" fill="#7C7570" text-anchor="middle">Made with care for the people who keep the city moving.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 2400" width="1080" height="2400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F5F1EA"/>
      <stop offset="1" stop-color="#FBE7DB" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3D2516"/>
      <stop offset="1" stop-color="#6B3D24"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- Page -->
  <rect width="1080" height="2400" fill="url(#bg)"/>

  <!-- Status bar -->
  <rect x="0" y="0" width="1080" height="80" fill="#FAF7F2"/>
  <text x="80" y="56" font-family="Georgia,serif" font-size="28" fill="#181818" font-weight="600">9:41</text>
  <g transform="translate(900,40)" fill="#181818">
    <rect x="0" y="6" width="22" height="14" rx="3"/>
    <rect x="34" y="2" width="20" height="22" rx="3" fill="none" stroke="#181818" stroke-width="2"/>
    <rect x="68" y="0" width="32" height="26" rx="4" fill="none" stroke="#181818" stroke-width="2"/>
    <rect x="72" y="4" width="22" height="18" rx="2"/>
  </g>

  <!-- Top headline copy (Arabic) -->
  <text x="540" y="200" font-family="Georgia,serif" font-size="62" font-weight="500" fill="#181818" text-anchor="middle" letter-spacing="-1">Real-time tracking,</text>
  <text x="540" y="270" font-family="Georgia,serif" font-size="62" font-weight="500" fill="#C96442" text-anchor="middle" letter-spacing="-1">at peace.</text>
  <text x="540" y="330" font-family="system-ui,sans-serif" font-size="26" fill="#7C7570" text-anchor="middle">Watch every bus in Damascus, refreshed every 5 seconds.</text>

  <!-- Device frame -->
  <g transform="translate(120,420)">
    <rect width="840" height="1740" rx="64" fill="#1A1614" filter="url(#soft)" opacity="0.18"/>
    <rect width="840" height="1740" rx="56" fill="#FAF7F2" stroke="#E5DFD3" stroke-width="2"/>

    <!-- App header inside phone -->
    <rect x="0" y="0" width="840" height="120" rx="56" fill="#FAF7F2"/>
    <rect x="0" y="80" width="840" height="40" fill="#FAF7F2"/>
    <line x1="0" y1="120" x2="840" y2="120" stroke="#E5DFD3" stroke-width="1.5"/>

    <!-- Brand mark -->
    <g transform="translate(40,40)">
      <rect width="46" height="46" rx="11" fill="#C96442"/>
      <text x="23" y="32" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#FFF8F3" text-anchor="middle">DT</text>
    </g>
    <text x="106" y="74" font-family="system-ui,sans-serif" font-size="26" font-weight="600" fill="#181818">نقل دمشق</text>

    <g transform="translate(720,52)">
      <circle r="6" fill="#4A8060"/>
      <text x="20" y="6" font-family="system-ui,sans-serif" font-size="20" fill="#4A4644">مباشر</text>
    </g>

    <!-- Map area (stylised abstract) -->
    <g transform="translate(40,160)">
      <rect width="760" height="900" rx="28" fill="#EFEBE3"/>
      <!-- Streets -->
      <g stroke="#D6CFC0" stroke-width="6" stroke-linecap="round" fill="none">
        <path d="M0 200 L760 200"/>
        <path d="M0 460 Q300 400 760 480"/>
        <path d="M0 700 L760 720"/>
        <path d="M200 0 L260 900"/>
        <path d="M500 0 Q520 450 480 900"/>
      </g>
      <!-- River curve -->
      <path d="M0 740 Q300 680 760 760" stroke="#AEDCCC" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.75"/>
      <!-- Vehicle dots with pulse rings -->
      <g>
        <circle cx="180" cy="190" r="36" fill="#C96442" fill-opacity="0.10"/>
        <circle cx="180" cy="190" r="22" fill="#C96442" fill-opacity="0.20"/>
        <circle cx="180" cy="190" r="11" fill="#C96442" stroke="#FFF8F3" stroke-width="3"/>
      </g>
      <g>
        <circle cx="430" cy="430" r="11" fill="#C96442" stroke="#FFF8F3" stroke-width="3"/>
      </g>
      <g>
        <circle cx="610" cy="680" r="32" fill="#C96442" fill-opacity="0.10"/>
        <circle cx="610" cy="680" r="11" fill="#C96442" stroke="#FFF8F3" stroke-width="3"/>
      </g>
      <g>
        <circle cx="280" cy="780" r="11" fill="#C96442" stroke="#FFF8F3" stroke-width="3"/>
      </g>
      <!-- Stop pin (gold) -->
      <g transform="translate(360,260)">
        <circle r="12" fill="#B9A779" stroke="#FFF8F3" stroke-width="3"/>
      </g>
      <g transform="translate(540,540)">
        <circle r="12" fill="#B9A779" stroke="#FFF8F3" stroke-width="3"/>
      </g>

      <!-- Legend card -->
      <g transform="translate(28,28)">
        <rect width="220" height="92" rx="14" fill="#FAF7F2" stroke="#E5DFD3"/>
        <circle cx="30" cy="34" r="8" fill="#C96442" stroke="#FFF8F3" stroke-width="2"/>
        <text x="52" y="42" font-family="system-ui,sans-serif" font-size="18" fill="#4A4644">حافلة</text>
        <circle cx="30" cy="68" r="8" fill="#B9A779"/>
        <text x="52" y="76" font-family="system-ui,sans-serif" font-size="18" fill="#4A4644">محطة</text>
      </g>
    </g>

    <!-- Stats strip -->
    <g transform="translate(40,1100)">
      <g>
        <rect width="240" height="160" rx="22" fill="#FAF7F2" stroke="#E5DFD3"/>
        <text x="22" y="42" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#7C7570" letter-spacing="2">حافلات عاملة</text>
        <text x="22" y="118" font-family="Georgia,serif" font-size="76" font-weight="500" fill="#181818" letter-spacing="-2">18</text>
        <text x="118" y="118" font-family="system-ui,sans-serif" font-size="20" fill="#7C7570">/ ٢٤</text>
      </g>
      <g transform="translate(260,0)">
        <rect width="240" height="160" rx="22" fill="#FAF7F2" stroke="#E5DFD3"/>
        <text x="22" y="42" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#7C7570" letter-spacing="2">عدد الخطوط</text>
        <text x="22" y="118" font-family="Georgia,serif" font-size="76" font-weight="500" fill="#181818" letter-spacing="-2">8</text>
      </g>
      <g transform="translate(520,0)">
        <rect width="240" height="160" rx="22" fill="#FAF7F2" stroke="#E5DFD3"/>
        <text x="22" y="42" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#7C7570" letter-spacing="2">عدد المحطات</text>
        <text x="22" y="118" font-family="Georgia,serif" font-size="76" font-weight="500" fill="#181818" letter-spacing="-2">54</text>
      </g>
    </g>

    <!-- Next route card -->
    <g transform="translate(40,1300)">
      <rect width="760" height="148" rx="22" fill="#FBE7DB" stroke="#F6D4C2"/>
      <rect x="22" y="36" width="74" height="74" rx="14" fill="#C96442"/>
      <text x="59" y="84" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#FFF8F3" text-anchor="middle">R12</text>
      <text x="120" y="68" font-family="system-ui,sans-serif" font-size="26" font-weight="600" fill="#181818">مزة — باب توما</text>
      <text x="120" y="106" font-family="system-ui,sans-serif" font-size="18" fill="#7C7570">يصل بعد ٤ دقائق · ١٨ محطة</text>
      <text x="720" y="84" font-family="Georgia,serif" font-size="48" font-weight="500" fill="#6B3D24" text-anchor="end">4 د</text>
    </g>

    <!-- Tabbar -->
    <g transform="translate(0,1600)">
      <rect width="840" height="140" fill="#FAF7F2"/>
      <line x1="0" y1="0" x2="840" y2="0" stroke="#E5DFD3" stroke-width="1.5"/>
      <g transform="translate(105,40)">
        <rect x="-32" y="-8" width="64" height="64" rx="14" fill="#FBE7DB"/>
        <text x="0" y="32" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#C96442" text-anchor="middle">الرئيسية</text>
      </g>
      <text x="315" y="72" font-family="system-ui,sans-serif" font-size="14" fill="#7C7570" text-anchor="middle">قريب</text>
      <text x="525" y="72" font-family="system-ui,sans-serif" font-size="14" fill="#7C7570" text-anchor="middle">الخطوط</text>
      <text x="735" y="72" font-family="system-ui,sans-serif" font-size="14" fill="#7C7570" text-anchor="middle">حسابي</text>
    </g>
  </g>

  <!-- Bottom kicker -->
  <text x="540" y="2280" font-family="system-ui,sans-serif" font-size="22" fill="#7C7570" text-anchor="middle">Free · Open-source · No ads · MIT-licensed</text>
</svg>

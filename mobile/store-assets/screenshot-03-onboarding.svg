<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 2400" width="1080" height="2400">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F5F1EA"/>
      <stop offset="1" stop-color="#FBE7DB"/>
    </linearGradient>
    <filter id="soft3" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1080" height="2400" fill="url(#bg3)"/>

  <text x="540" y="200" font-family="Georgia,serif" font-size="62" font-weight="500" fill="#181818" text-anchor="middle" letter-spacing="-1">A calm welcome,</text>
  <text x="540" y="270" font-family="Georgia,serif" font-size="62" font-weight="500" fill="#C96442" text-anchor="middle" letter-spacing="-1">no ads, ever.</text>
  <text x="540" y="330" font-family="system-ui,sans-serif" font-size="26" fill="#7C7570" text-anchor="middle">Three friendly slides explain everything.</text>

  <!-- Device frame -->
  <g transform="translate(120,420)">
    <rect width="840" height="1740" rx="64" fill="#1A1614" filter="url(#soft3)" opacity="0.18"/>
    <rect width="840" height="1740" rx="56" fill="#FAF7F2" stroke="#E5DFD3" stroke-width="2"/>

    <!-- Skip -->
    <text x="780" y="80" font-family="system-ui,sans-serif" font-size="20" font-weight="500" fill="#4A4644" text-anchor="end">تخطّي</text>

    <!-- Illustration: pulse / live tracking -->
    <g transform="translate(420,500)">
      <circle r="280" fill="#FBE7DB"/>
      <circle r="190" fill="none" stroke="#C96442" stroke-width="3" opacity="0.18"/>
      <circle r="130" fill="none" stroke="#C96442" stroke-width="3" opacity="0.36"/>
      <circle r="70"  fill="none" stroke="#C96442" stroke-width="3" opacity="0.55"/>
      <circle r="22"  fill="#6B8E78"/>
      <!-- soft road -->
      <path d="M-220 220 Q0 140 220 240" stroke="#D97757" stroke-width="6" stroke-opacity="0.55" stroke-linecap="round" fill="none"/>
    </g>

    <!-- Eyebrow -->
    <text x="60" y="980" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#C96442" letter-spacing="3">لحظياً</text>

    <!-- Display headline -->
    <text x="60" y="1080" font-family="Georgia,serif" font-size="68" font-weight="500" fill="#181818" letter-spacing="-2">مواقع الحافلات</text>
    <text x="60" y="1158" font-family="Georgia,serif" font-size="68" font-weight="500" fill="#181818" letter-spacing="-2">تُحدَّث كل ٥ ثوانٍ</text>

    <!-- Body -->
    <text x="60" y="1240" font-family="system-ui,sans-serif" font-size="26" fill="#7C7570">الخريطة تبيّن لك الحافلات أثناء حركتها،</text>
    <text x="60" y="1280" font-family="system-ui,sans-serif" font-size="26" fill="#7C7570">ودقيقة الوصول محسوبة من مواقعها الفعلية.</text>

    <!-- Progress dots -->
    <g transform="translate(420,1440)">
      <circle cx="-32" cy="0" r="6" fill="#E5DFD3"/>
      <rect x="-12" y="-5" width="40" height="10" rx="5" fill="#C96442"/>
      <circle cx="48"  cy="0" r="6" fill="#E5DFD3"/>
    </g>

    <!-- CTA -->
    <g transform="translate(60,1520)">
      <rect width="720" height="100" rx="50" fill="#C96442"/>
      <text x="360" y="62" font-family="system-ui,sans-serif" font-size="26" font-weight="600" fill="#FFF8F3" text-anchor="middle">التالي</text>
    </g>
  </g>

  <text x="540" y="2280" font-family="system-ui,sans-serif" font-size="22" fill="#7C7570" text-anchor="middle">No accounts required to ride. No data leaves your phone unless you opt in.</text>
</svg>

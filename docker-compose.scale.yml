# ─────────────────────────────────────────────────────────────────────────────
# OPT-IN scale / observability stack — Phases S2.2 + S7.2 (Scale_100k_Roadmap.md)
#
# This is ADDITIVE. It does NOT replace docker-compose.prod.yml and does not
# touch the working 500-vehicle deployment. Bring it up alongside the API:
#
#     docker compose -f docker-compose.scale.yml up -d
#
# Services:
#   redis          — pub/sub backend for the live position bus (S3.4) + geo cache
#   mosquitto      — dev MQTT broker (1883 TCP, 9001 WebSocket)
#   mqtt-consumer  — subscribes to vehicles/+/status|event → existing ingest pipeline
#   prometheus     — scrapes the API /metrics endpoint (enable with METRICS_ENABLED=true)
#   grafana        — dashboards (provisioned: "DamascusTransit — API Overview")
#
# Grafana:   http://127.0.0.1:3001   (admin / $GRAFANA_ADMIN_PASSWORD — required, no default)
# Prometheus: http://127.0.0.1:9090
# Redis:      redis://127.0.0.1:6379/0   (point the API at it with REDIS_PUBSUB_URL)
#
# SECURITY: every published port below is bound to 127.0.0.1 (loopback) so this
# dev stack is never exposed on a LAN/public interface. Grafana requires
# GRAFANA_ADMIN_PASSWORD to be set (no insecure default). Mosquitto/Redis remain
# auth-less for local dev only — add auth before exposing them anywhere.
# ─────────────────────────────────────────────────────────────────────────────
services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "127.0.0.1:6379:6379"
    networks: [scale]

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "127.0.0.1:1883:1883"
      - "127.0.0.1:9001:9001"
    volumes:
      - ./monitoring/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
    networks: [scale]

  mqtt-consumer:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    command: ["python", "-m", "api.workers.mqtt_consumer"]
    environment:
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: "1883"
      # Live position bus (S3.4) — every MQTT-ingested frame is published here so
      # /api/stream subscribers get it without polling the database.
      REDIS_PUBSUB_URL: ${REDIS_PUBSUB_URL:-redis://redis:6379/0}
      # Optional cloud services — the worker soft-fails (no-ops) when unset.
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL:-}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
    depends_on:
      - mosquitto
      - redis
    networks: [scale]

  geo-gc:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    command: ["python", "-m", "api.workers.geo_gc"]
    environment:
      # Prune vehicles from the Redis GEO live set once their latest position
      # is older than this (seconds); sweep on the interval below.
      GEO_PRUNE_AFTER_SECONDS: ${GEO_PRUNE_AFTER_SECONDS:-3600}
      GEO_PRUNE_INTERVAL_SECONDS: ${GEO_PRUNE_INTERVAL_SECONDS:-1800}
      # GEO set lives in Upstash; stale lookup uses Supabase. Soft-fails when unset.
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL:-}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
    depends_on:
      - redis
    networks: [scale]

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [scale]

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      # Required — compose refuses to start the stack if this is unset, so the
      # dashboard can never come up on the well-known admin/admin default.
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD in your .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks: [scale]

volumes:
  mosquitto-data:
  prometheus-data:
  grafana-data:

networks:
  scale:
    driver: bridge

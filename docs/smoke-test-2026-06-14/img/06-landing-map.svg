<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" font-family="'Segoe UI',system-ui,sans-serif">
  <rect width="1040" height="560" fill="#F0F2EE"/>
  <text x="32" y="36" font-size="22" font-weight="700" fill="#0B0B0B">Public Landing + Live Map — / (annotated; verified live this session)</text>

  <!-- browser frame -->
  <rect x="32" y="56" width="976" height="476" rx="8" fill="#fff" stroke="#D9DDD5"/>
  <!-- utility bar -->
  <rect x="32" y="56" width="976" height="26" rx="8" fill="#061F1B"/>
  <text x="48" y="73" font-size="10" fill="#C9A95B">★ الجمهورية العربية السورية · Public Transit</text>
  <text x="992" y="73" font-size="10" fill="#ffffffcc" text-anchor="end">Home · Passengers · Drivers · Admin sign-in</text>
  <!-- masthead -->
  <rect x="32" y="82" width="976" height="56" fill="#0A302A"/>
  <rect x="48" y="92" width="36" height="36" rx="5" fill="#fff"/>
  <text x="96" y="108" font-size="14" font-weight="700" fill="#fff">Damascus Transit</text>
  <text x="96" y="124" font-size="9" fill="#C9A95B">v5.0 · مايو ٢٠٢٦</text>
  <!-- nav -->
  <rect x="32" y="138" width="976" height="32" fill="#fff" stroke="#D9DDD5"/>
  <text x="56" y="159" font-size="11" font-weight="700" fill="#0E5650">Home</text>
  <text x="120" y="159" font-size="11" fill="#3C3C3C">Passengers</text>
  <text x="210" y="159" font-size="11" fill="#3C3C3C">Drivers</text>
  <text x="280" y="159" font-size="11" fill="#3C3C3C">Admin sign-in</text>

  <!-- hero -->
  <rect x="32" y="170" width="976" height="120" fill="#0E5650"/>
  <text x="56" y="212" font-size="24" font-weight="700" fill="#fff">Real-time Damascus bus tracking</text>
  <text x="56" y="236" font-size="12" fill="#ffffffcc">A national open-source platform connecting passengers, drivers, and dispatchers.</text>
  <rect x="56" y="250" width="150" height="34" rx="4" fill="#C9A95B"/>
  <text x="131" y="272" font-size="12" font-weight="700" fill="#061F1B" text-anchor="middle">Find your route</text>
  <rect x="216" y="250" width="150" height="34" rx="4" fill="none" stroke="#ffffff88"/>
  <text x="291" y="272" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Open the live map</text>

  <!-- map -->
  <rect x="56" y="306" width="700" height="200" rx="6" fill="#E8EEF0" stroke="#D9DDD5"/>
  <path d="M70 400 h672 M300 320 v180 M470 320 v180 M620 320 v180" stroke="#d6c7b0" stroke-width="6" opacity="0.7"/>
  <path d="M70 360 h672 M70 450 h672" stroke="#cdd8d0" stroke-width="5"/>
  <circle cx="320" cy="372" r="7" fill="#1F7068" stroke="#fff" stroke-width="2"/>
  <circle cx="430" cy="420" r="7" fill="#1F7068" stroke="#fff" stroke-width="2"/>
  <circle cx="540" cy="386" r="7" fill="#1F7068" stroke="#fff" stroke-width="2"/>
  <circle cx="610" cy="452" r="7" fill="#1F7068" stroke="#fff" stroke-width="2"/>
  <circle cx="500" cy="470" r="7" fill="#1F7068" stroke="#fff" stroke-width="2"/>
  <circle cx="380" cy="340" r="7" fill="#1F7068" stroke="#fff" stroke-width="2"/>
  <!-- legend -->
  <rect x="70" y="320" width="92" height="44" rx="4" fill="#fff" stroke="#D9DDD5"/>
  <circle cx="84" cy="334" r="5" fill="#1F7068" stroke="#fff" stroke-width="1.5"/><text x="96" y="338" font-size="9" fill="#3C3C3C">حافلة</text>
  <circle cx="84" cy="350" r="5" fill="#C9A95B"/><text x="96" y="354" font-size="9" fill="#3C3C3C">محطة</text>
  <text x="742" y="500" font-size="8" fill="#3C3C3C" text-anchor="end">© OpenStreetMap | MapLibre</text>
  <!-- connected badge -->
  <rect x="660" y="312" width="86" height="22" rx="4" fill="#DCEAE7"/>
  <circle cx="676" cy="323" r="4" fill="#0E5650"/><text x="716" y="327" font-size="9" font-weight="700" fill="#0E443B" text-anchor="middle">متصل</text>

  <!-- callouts -->
  <line x1="756" y1="406" x2="790" y2="406" stroke="#0E5650" stroke-width="2"/>
  <rect x="772" y="320" width="226" height="92" rx="8" fill="#DCEAE7" stroke="#0E5650"/>
  <text x="784" y="342" font-size="12" font-weight="700" fill="#0E443B">✓ Live map works</text>
  <text x="784" y="361" font-size="10.5" fill="#0E443B">Damascus OSM tiles render;</text>
  <text x="784" y="377" font-size="10.5" fill="#0E443B">~6 vehicle markers stream over</text>
  <text x="784" y="393" font-size="10.5" fill="#0E443B">SSE; “متصل” badge live.</text>

  <rect x="772" y="420" width="226" height="86" rx="8" fill="#F4E8D9" stroke="#B5651D"/>
  <text x="784" y="442" font-size="11" font-weight="700" fill="#6A4413">⚠ Partial i18n</text>
  <text x="784" y="461" font-size="10.5" fill="#6A4413">Nav flips to EN but map legend</text>
  <text x="784" y="477" font-size="10.5" fill="#6A4413">&amp; section headings stay Arabic;</text>
  <text x="784" y="493" font-size="10.5" fill="#6A4413">route stop-counts show “—”.</text>

  <text x="32" y="552" font-size="11" fill="#6A6A6A">Stats strip (active buses / routes / stops / occupancy), popular-routes list, and feature cards all render with skeleton→data loading states.</text>
</svg>

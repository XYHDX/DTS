<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="720" viewBox="0 0 1040 720" font-family="'Segoe UI',system-ui,sans-serif">
  <rect width="1040" height="720" fill="#F0F2EE"/>
  <text x="32" y="40" font-size="22" font-weight="700" fill="#0B0B0B">Passenger PWA — /passenger/ (annotated UI snapshot, RTL Arabic)</text>
  <text x="32" y="62" font-size="13" fill="#6A6A6A">Single-page app · bottom-tab navigation · MapLibre mini-map · offline-capable (service worker)</text>

  <!-- phone frame -->
  <rect x="40" y="86" width="380" height="600" rx="26" fill="#FFFFFF" stroke="#0B0B0B" stroke-width="2"/>
  <!-- flag strip -->
  <rect x="40" y="86" width="126" height="5" fill="#0E5650"/><rect x="166" y="86" width="128" height="5" fill="#FFFFFF"/><rect x="294" y="86" width="126" height="5" fill="#0B0B0B"/>
  <!-- topbar -->
  <path d="M40 91 h380 v96 a0 0 0 0 1 0 0 v0 q0 16 -16 16 h-348 q-16 0 -16 -16 z" fill="#0E443B"/>
  <text x="404" y="124" font-size="17" font-weight="700" fill="#fff" text-anchor="end">أهلاً بك</text>
  <rect x="56" y="108" width="44" height="22" rx="4" fill="#ffffff22" stroke="#ffffff44"/>
  <text x="78" y="123" font-size="11" fill="#fff" text-anchor="middle">EN</text>
  <text x="404" y="146" font-size="10" fill="#ffffffcc" text-anchor="end">ابحث عن محطتك أو خطك أو شاهد أقرب الحافلات</text>
  <!-- search bar (pill) -->
  <rect x="58" y="156" width="344" height="40" rx="20" fill="#ffffff1f" stroke="#ffffff33"/>
  <circle cx="80" cy="176" r="15" fill="#C9A95B"/>
  <path d="M75 176 a4 4 0 1 0 8 0 a4 4 0 0 0 -8 0 M83 180 l3 3" stroke="#0E443B" stroke-width="1.6" fill="none"/>
  <text x="384" y="181" font-size="11" fill="#ffffff99" text-anchor="end">اسم محطة أو خط (مثال: مزة، باب توما)</text>

  <!-- nearest stops -->
  <text x="404" y="232" font-size="13" font-weight="700" fill="#3C3C3C" text-anchor="end">أقرب المحطات إليك</text>
  <rect x="300" y="244" width="64" height="26" rx="13" fill="none" stroke="#0E5650"/>
  <text x="332" y="261" font-size="10" fill="#0E5650" text-anchor="middle">موقعي ◎</text>
  <rect x="58" y="278" width="344" height="58" rx="10" fill="#fff" stroke="#D9DDD5"/>
  <rect x="338" y="296" width="48" height="22" rx="11" fill="#DCEAE7"/>
  <text x="362" y="311" font-size="10" font-weight="700" fill="#115148" text-anchor="middle">٤٢٠ م</text>
  <text x="324" y="302" font-size="12" font-weight="700" fill="#0B0B0B" text-anchor="end">محطة المرجة</text>
  <text x="324" y="320" font-size="10" fill="#6A6A6A" text-anchor="end">٤٤٥ · ٤٠ج</text>
  <text x="78" y="312" font-size="12" font-weight="700" fill="#115148">~ ٦ د</text>

  <!-- popular routes -->
  <text x="404" y="368" font-size="13" font-weight="700" fill="#3C3C3C" text-anchor="end">الخطوط الشائعة</text>
  <rect x="58" y="380" width="344" height="50" rx="10" fill="#fff" stroke="#D9DDD5"/>
  <rect x="350" y="392" width="40" height="26" rx="6" fill="#F8F1DE"/>
  <text x="370" y="409" font-size="11" font-weight="700" fill="#9C7A3A" text-anchor="middle">445</text>
  <text x="336" y="402" font-size="12" font-weight="700" fill="#0B0B0B" text-anchor="end">المرجة - المزة</text>
  <rect x="64" y="394" width="58" height="22" rx="4" fill="#DCEAE7"/>
  <text x="93" y="409" font-size="9" font-weight="700" fill="#115148" text-anchor="middle">— محطة</text>

  <!-- mini map -->
  <text x="404" y="462" font-size="13" font-weight="700" fill="#3C3C3C" text-anchor="end">حافلات قريبة</text>
  <rect x="58" y="474" width="344" height="120" rx="10" fill="#E8EEF0" stroke="#D9DDD5"/>
  <path d="M70 520 h320 M150 484 v100 M260 484 v100" stroke="#cdd8d0" stroke-width="6"/>
  <circle cx="180" cy="512" r="6" fill="#00876f" stroke="#fff" stroke-width="2"/>
  <circle cx="300" cy="548" r="6" fill="#00876f" stroke="#fff" stroke-width="2"/>
  <text x="384" y="582" font-size="9" fill="#0E5650" text-anchor="end">© OpenStreetMap</text>

  <!-- bottom nav -->
  <rect x="40" y="622" width="380" height="64" fill="#fff" stroke="#D9DDD5"/>
  <line x1="40" y1="622" x2="420" y2="622" stroke="#D9DDD5"/>
  <text x="135" y="660" font-size="10" font-weight="700" fill="#0E5650" text-anchor="middle">الرئيسية ▲</text>
  <text x="230" y="660" font-size="10" fill="#6A6A6A" text-anchor="middle">قريب ◎</text>
  <text x="325" y="660" font-size="10" fill="#6A6A6A" text-anchor="middle">الخطوط ▦</text>
  <text x="395" y="660" font-size="10" fill="#6A6A6A" text-anchor="middle">حسابي ◔</text>

  <!-- CALLOUTS -->
  <!-- search broken -->
  <line x1="402" y1="176" x2="470" y2="176" stroke="#CE1126" stroke-width="2"/>
  <rect x="470" y="150" width="540" height="58" rx="8" fill="#fbe1e4" stroke="#CE1126"/>
  <text x="484" y="172" font-size="13" font-weight="700" fill="#6e0712">⛔ HIGH — Search is non-functional</text>
  <text x="484" y="192" font-size="11" fill="#6e0712">Form has no submit handler &amp; the input has no name → submitting reloads “/passenger/?” and clears. No results UI exists.</text>

  <!-- route deep link dead -->
  <line x1="402" y1="405" x2="470" y2="405" stroke="#B5651D" stroke-width="2"/>
  <rect x="470" y="380" width="540" height="56" rx="8" fill="#F4E8D9" stroke="#B5651D"/>
  <text x="484" y="402" font-size="13" font-weight="700" fill="#6A4413">⚠ MEDIUM — Route deep-link is a dead end</text>
  <text x="484" y="421" font-size="11" fill="#6A4413">Card links to “?route=&lt;id&gt;” but no JS reads the param → tapping a route just re-shows the home view.</text>

  <!-- stop count null -->
  <line x1="122" y1="405" x2="470" y2="470" stroke="#B5651D" stroke-width="1" stroke-dasharray="3"/>
  <rect x="470" y="448" width="540" height="40" rx="8" fill="#F4E8D9" stroke="#B5651D"/>
  <text x="484" y="473" font-size="11" fill="#6A4413">⚠ LOW — “— محطة” : stops_count not populated on /api/routes (cosmetic data gap).</text>

  <!-- works -->
  <line x1="402" y1="534" x2="470" y2="534" stroke="#0E5650" stroke-width="2"/>
  <rect x="470" y="508" width="540" height="56" rx="8" fill="#DCEAE7" stroke="#0E5650"/>
  <text x="484" y="530" font-size="13" font-weight="700" fill="#0E443B">✓ WORKS — Mini-map, nearest-stops, geolocation, SSE</text>
  <text x="484" y="549" font-size="11" fill="#0E443B">“موقعي” geolocates &amp; fits the map; “قريب” tab scrolls to stops; live vehicle dots stream over SSE; offline banner wired.</text>

  <rect x="470" y="586" width="540" height="86" rx="8" fill="#fff" stroke="#D9DDD5"/>
  <text x="484" y="608" font-size="12" font-weight="700" fill="#0B0B0B">Bottom-nav behaviour</text>
  <text x="484" y="628" font-size="11" fill="#3C3C3C">الرئيسية = home · قريب = geolocate+scroll · الخطوط = scrolls to</text>
  <text x="484" y="645" font-size="11" fill="#3C3C3C">#popular-routes anchor · حسابي = /admin/login.html.</text>
  <text x="484" y="664" font-size="11" fill="#6A6A6A">Tabs are in-page anchors, not separate views (by design).</text>
</svg>

<style>
  :root { --hg-max: 1060px; }
  body { background: var(--color-surface, #faf9f6); }

  /* Hero */
  .help-hero {
    position: relative; color:#fff; overflow:hidden;
    padding: clamp(48px, 8vw, 80px) 0 clamp(40px, 6vw, 64px);
    background-color: var(--national-green, #0E5650);
    background-image:
      radial-gradient(ellipse at 82% 18%, rgba(201,169,91,.22), transparent 55%),
      radial-gradient(ellipse at 15% 85%, rgba(255,255,255,.06), transparent 50%);
    border-bottom: 3px solid var(--national-gold, #C9A95B);
  }
  /* Gold geometric pattern overlay — same motif/opacity as the home hero. */
  .help-hero::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80' viewBox='0 0 80 80'><g fill='none' stroke='%23C9A95B' stroke-width='1' stroke-opacity='0.42' stroke-linejoin='round' stroke-linecap='round'><polygon points='68,40 51,45 60,60 45,51 40,68 35,51 20,60 29,45 12,40 29,35 20,20 35,29 40,12 45,29 60,20 51,35'/><path d='M68,40 L80,36.5 M68,40 L80,43.5 M40,68 L36.5,80 M40,68 L43.5,80 M12,40 L0,36.5 M12,40 L0,43.5 M40,12 L36.5,0 M40,12 L43.5,0 M60,20 L72,0 M60,20 L80,8 M60,60 L80,72 M60,60 L72,80 M20,60 L8,80 M20,60 L0,72 M20,20 L0,8 M20,20 L8,0'/><polyline points='8,0 8,3.3 3.3,8 0,8'/><polyline points='80,8 76.7,8 72,3.3 72,0'/><polyline points='72,80 72,76.7 76.7,72 80,72'/><polyline points='8,80 8,76.7 3.3,72 0,72'/></g></svg>");
    background-size: 80px 80px;
  }
  .help-hero .help-wrap { position: relative; z-index: 1; }
  .help-wrap { width: 100%; max-width: var(--container, 1180px); margin-inline: auto; padding-inline: var(--s-5, 24px); }
  .help-hero .eyebrow {
    display:inline-block; font-size:13px; font-weight:600; letter-spacing:.06em;
    color: var(--national-gold,#C9A95B); border:1px solid rgba(201,169,91,.5);
    border-radius:999px; padding:5px 14px; margin-bottom:18px;
  }
  .help-hero h1 { margin:0 0 14px; font-size: clamp(28px, 5vw, 44px); line-height:1.15; font-weight:700; }
  .help-hero p.lede { margin:0; max-width:60ch; font-size: clamp(15px,2.2vw,18px); line-height:1.6; color:rgba(255,255,255,.85); }

  /* Language toggle (top-right floating pill) */
  .help-topbar { background: var(--national-green-900,#082b25); }
  .help-topbar .help-wrap { display:flex; align-items:center; justify-content:space-between; padding-block:10px; }
  .help-topbar a { color:rgba(255,255,255,.82); text-decoration:none; font-size:13.5px; }
  .help-topbar nav { display:flex; gap:18px; flex-wrap:wrap; }
  .help-topbar a:hover { color:#fff; }
  .lang-btn {
    background: transparent; color: var(--national-gold,#C9A95B);
    border:1px solid var(--national-gold,#C9A95B); border-radius:999px;
    padding:7px 18px; font:inherit; font-weight:700; font-size:13px; cursor:pointer;
    letter-spacing:.04em; transition:.15s;
  }
  .lang-btn:hover { background: var(--national-gold,#C9A95B); color: var(--national-green-900,#082b25); }

  /* Tabs */
  .help-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-top:26px; }
  .help-tab {
    background: rgba(255,255,255,.10); color:#fff; border:1px solid rgba(255,255,255,.18);
    border-radius:999px; padding:9px 18px; font:inherit; font-size:14px; font-weight:600;
    cursor:pointer; transition:.15s;
  }
  .help-tab:hover { background: rgba(255,255,255,.18); }
  .help-tab.is-active { background: var(--national-gold,#C9A95B); color: var(--national-green-900,#082b25); border-color:transparent; }

  /* Body layout */
  .help-body { padding: clamp(34px,6vw,56px) 0 80px; }
  .help-grid { display:grid; grid-template-columns: 220px 1fr; gap: clamp(24px,4vw,52px); align-items:start; }
  .help-toc { position: sticky; top: 18px; }
  .help-toc h6 { margin:0 0 12px; font-size:12px; letter-spacing:.08em; text-transform:uppercase; color: var(--color-text-soft,#6b7280); }
  .help-toc a {
    display:block; padding:9px 12px; border-radius:9px; margin-bottom:4px;
    color: var(--color-text,#1f2937); text-decoration:none; font-size:14.5px; transition:.12s;
  }
  .help-toc a:hover { background: rgba(14,86,80,.07); }
  .help-toc a.is-active { background: rgba(14,86,80,.12); color: var(--national-green,#0E5650); font-weight:600; }

  .help-section { scroll-margin-top: 16px; margin-bottom: 56px; }
  .help-section:last-child { margin-bottom: 0; }
  .sec-eyebrow { font-size:13px; font-weight:700; letter-spacing:.05em; color: var(--national-gold,#b3923f); }
  .help-section h2 { margin:6px 0 12px; font-size: clamp(22px,3.4vw,30px); line-height:1.2; color: var(--national-green-900,#082b25); }
  .help-section h3 { margin:30px 0 10px; font-size:18px; color: var(--national-green,#0E5650); }
  .help-section p.lede { margin:0 0 8px; font-size: clamp(15px,2vw,17px); line-height:1.65; color: var(--color-text,#374151); }
  .help-section p { line-height:1.65; color: var(--color-text,#374151); }
  .help-section ul { line-height:1.7; color:var(--color-text,#374151); padding-inline-start:22px; }
  code { background: rgba(14,86,80,.08); color: var(--national-green,#0E5650); padding:1px 6px; border-radius:5px; font-family:'JetBrains Mono',monospace; font-size:.88em; }

  /* Steps */
  ol.steps { list-style:none; counter-reset: s; margin:0; padding:0; }
  ol.steps > li {
    position:relative; padding-inline-start:52px; margin-bottom:18px;
  }
  ol.steps > li::before {
    counter-increment: s; content: counter(s);
    position:absolute; inset-inline-start:0; top:0;
    width:34px; height:34px; border-radius:50%;
    background: var(--national-green,#0E5650); color:#fff;
    display:grid; place-items:center; font-weight:700; font-size:15px;
  }
  ol.steps b { display:block; font-size:15.5px; color: var(--national-green-900,#082b25); margin-bottom:3px; }
  ol.steps p { margin:0; font-size:14.5px; }

  /* Callouts */
  .note {
    display:flex; gap:13px; align-items:flex-start;
    border-radius:12px; padding:16px 18px; margin:22px 0 0;
    background: rgba(14,86,80,.06); border:1px solid rgba(14,86,80,.16);
  }
  .note .ico {
    flex-shrink:0; width:28px; height:28px; border-radius:50%;
    background: var(--national-green,#0E5650); color:#fff;
    display:grid; place-items:center; font-weight:700; font-size:15px;
  }
  .note h5 { margin:0 0 3px; font-size:15px; color: var(--national-green-900,#082b25); }
  .note p { margin:0; font-size:14px; }
  .note--warn { background: rgba(201,169,91,.13); border-color: rgba(201,169,91,.4); }
  .note--warn .ico { background: #b3923f; }
  .note--danger { background: rgba(206,17,38,.07); border-color: rgba(206,17,38,.28); }
  .note--danger .ico { background: var(--national-red,#CE1126); }

  /* Diagram */
  .diagram { margin:18px 0; border:1px solid var(--color-border,#e5e7eb); border-radius:12px; overflow:hidden; background:#fff; }
  .diagram svg { display:block; }
  .diagram .cap { padding:10px 16px; font-size:13px; color: var(--color-text-soft,#6b7280); background: var(--color-surface-2,#f3f4f6); border-top:1px solid var(--color-border,#e5e7eb); }

  /* Trouble table */
  .trouble { border:1px solid var(--color-border,#e5e7eb); border-radius:12px; overflow:hidden; }
  .trouble .row { display:grid; grid-template-columns: 230px 1fr; gap:0; border-bottom:1px solid var(--color-border,#e5e7eb); }
  .trouble .row:last-child { border-bottom:0; }
  .trouble .q { padding:14px 16px; font-weight:600; background: var(--color-surface-2,#f6f7f8); color: var(--national-green-900,#082b25); font-size:14.5px; }
  .trouble .a { padding:14px 16px; font-size:14px; line-height:1.6; color: var(--color-text,#374151); }

  @media (max-width: 820px) {
    .help-grid { grid-template-columns: 1fr; }
    .help-toc { display:none; }
    .trouble .row { grid-template-columns: 1fr; }
    .trouble .q { border-bottom:1px solid var(--color-border,#e5e7eb); }
  }
</style>
</head>

<script>
(function () {

      '<text x="60" y="58" fill="#0E5650" text-anchor="middle" font-family="Readex Pro,sans-serif" font-size="12" font-weight="700">'+L.d3+'</text>' +
      '<circle cx="42" cy="96" r="4" fill="#0E5650"/><circle cx="62" cy="104" r="4" fill="#0E5650"/><circle cx="82" cy="90" r="4" fill="#0E5650"/></g>' +
      '</svg><div class="cap">'+L.dcap+'</div></div>';
  }

  // ---- Bilingual content model ------------------------------------------------
  const NAV = {
    ar: { home:'الرئيسية', passenger:'للركاب', driver:'للسائقين', admin:'دخول الإدارة', help:'كيفية الاستخدام', gov:'الجمهورية العربية السورية · نظام النقل العام' },

  function build(L) {

  const AR = {
    dir:'rtl', btn:'English',
    eyebrow:'دليل المنصّة · 2026',

      {id:'trouble', label:'حلّ المشاكل'},

  const DATA = { ar: AR, en: EN };
  let lang = (function () {
    try { return (localStorage.getItem('dt_lang') === 'en') ? 'en' : 'ar'; } catch (e) { return 'ar'; }
  })();

  const esc = (s) => String(s == null ? '' : s);

  function blockHTML(b, L) {
    if (b.diagram) return diagram(L);
    if (b.h3) return '<h3>' + esc(b.h3) + '</h3>';
    if (b.p) return '<p>' + b.p + '</p>';
    if (b.steps) return '<ol class="steps">' + b.steps.map(s =>
      '<li><b>' + esc(s[0]) + '</b><p>' + s[1] + '</p></li>').join('') + '</ol>';
    if (b.note) {
      const kind = b.note[3] ? ' note--' + b.note[3] : '';
      return '<div class="note' + kind + '"><span class="ico">' + esc(b.note[0]) + '</span>' +
        '<div><h5>' + esc(b.note[1]) + '</h5><p>' + b.note[2] + '</p></div></div>';
    }
    if (b.table) return '<div class="trouble">' + b.table.map(r =>
      '<div class="row"><div class="q">' + esc(r[0]) + '</div><div class="a">' + r[1] + '</div></div>').join('') + '</div>';
    return '';
  }

  function render() {
    const L = DATA[lang];
    document.documentElement.lang = lang;
    document.documentElement.dir = L.dir;
    document.getElementById('lang-btn').textContent = L.btn;
    document.getElementById('hero-eyebrow').textContent = L.eyebrow;
    document.getElementById('hero-title').textContent = L.title;
    document.getElementById('hero-lede').textContent = L.lede;

    // Top bar + sticky nav labels (same pattern as home)
    var gov = document.getElementById('ub-gov');
    if (gov) gov.textContent = NAV[lang].gov;
    document.querySelectorAll('[data-nav]').forEach(a => {
      a.textContent = NAV[lang][a.dataset.nav] || a.textContent;
    });

    // Tabs
    document.getElementById('tabs').innerHTML = L.tabs.map((t, i) =>
      '<button class="help-tab' + (i === 0 ? ' is-active' : '') + '" data-target="' + t.id + '">' + esc(t.label) + '</button>').join('');

    // TOC
    document.getElementById('toc').innerHTML = '<h6>' + esc(L.tocTitle) + '</h6>' +
      L.sections.map((s, i) => '<a href="#' + s.id + '"' + (i === 0 ? ' class="is-active"' : '') + '>' +
        esc(s.n) + ' · ' + esc(s.eyebrow) + '</a>').join('');

    // Sections
    document.getElementById('content').innerHTML = L.sections.map(s =>
      '<section class="help-section" id="' + s.id + '">' +
        '<span class="sec-eyebrow">' + esc(s.n) + ' · ' + esc(s.eyebrow) + '</span>' +
        '<h2>' + esc(s.title) + '</h2>' +
        '<p class="lede">' + esc(s.lede) + '</p>' +
        s.blocks.map(b => blockHTML(b, L)).join('') +
      '</section>').join('');

    wireScroll();
  }

  function wireScroll() {
    document.querySelectorAll('#tabs .help-tab, #toc a').forEach(el => {
      el.addEventListener('click', function (ev) {
        const id = this.dataset.target || (this.getAttribute('href') || '').slice(1);
        const target = document.getElementById(id);
        if (target) { ev.preventDefault(); target.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
      });
    });
    // Scroll-spy
    const links = Array.from(document.querySelectorAll('#toc a'));
    const tabs = Array.from(document.querySelectorAll('#tabs .help-tab'));
    const secs = links.map(a => document.getElementById(a.getAttribute('href').slice(1))).filter(Boolean);
    if ('IntersectionObserver' in window && secs.length) {
      const io = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            const id = e.target.id;
            links.forEach(a => a.classList.toggle('is-active', a.getAttribute('href') === '#' + id));
            tabs.forEach(t => t.classList.toggle('is-active', t.dataset.target === id));
          }
        });
      }, { rootMargin: '-20% 0px -70% 0px' });
      secs.forEach(s => io.observe(s));
    }
  }

  document.getElementById('lang-btn').addEventListener('click', function () {
    lang = (lang === 'ar') ? 'en' : 'ar';
    try { localStorage.setItem('dt_lang', lang); } catch (e) {}
    render();
  });

  render();
})();

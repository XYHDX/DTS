<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#002623">
<title>التحليلات — نقل دمشق</title>

<link rel="icon" href="/favicon.svg" type="image/svg+xml">

<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/lib/design-system.css">
<style>
  .page { max-width: 1200px; margin: 0 auto; padding: var(--s-5) var(--s-4) var(--s-8); }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--s-4); }
  .col-2 { grid-column: span 2; }
  .chart {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--r-lg);
    padding: var(--s-4);
    min-height: 280px;
  }
  .chart h2 { margin: 0 0 var(--s-3); font-size: var(--fs-md); font-weight: 700; }
  .filter-bar {
    display: flex; flex-wrap: wrap; gap: var(--s-2); margin-bottom: var(--s-5);
  }
  .filter-pill {
    padding: var(--s-2) var(--s-4); border-radius: var(--r-pill);
    background: var(--color-surface); border: 1px solid var(--color-border);
    font-size: var(--fs-sm); font-weight: 600; color: var(--color-text-soft); cursor: pointer;
  }
  .filter-pill.is-active { background: var(--brand-700); color: #fff; border-color: var(--brand-700); }
  @media (max-width: 800px) {
    .row { grid-template-columns: 1fr; }
    .col-2 { grid-column: auto; }
  }
</style>
</head>
<body>

<header class="app-header">
  <a class="app-header__brand" href="/">
    <span class="app-header__brand-mark">DT</span>
    <span>نقل دمشق</span>
  </a>
  <div class="app-header__spacer"></div>
  <nav class="app-header__nav">
    <a href="/admin/">الإدارة</a>
    <a href="/dashboard/analytics.html" class="is-active">التحليلات</a>
  </nav>
</header>

<main class="page">
  <div class="cluster between mb-4">
    <div>
      <h1 style="margin:0">التحليلات</h1>
      <p class="muted" style="margin:0">مؤشرات أداء الأسطول والخطوط.</p>
    </div>
    <div class="filter-bar">
      <button class="filter-pill" data-range="24h">آخر ٢٤ ساعة</button>
      <button class="filter-pill is-active" data-range="7d">أسبوع</button>
      <button class="filter-pill" data-range="30d">شهر</button>
    </div>
  </div>

  <div class="row mb-4">
    <div class="stat"><span class="stat__label">رحلات هذا الأسبوع</span><span class="stat__value" id="m-trips">—</span><span class="stat__sub" id="m-trips-d">—</span></div>
    <div class="stat"><span class="stat__label">دقّة المواعيد</span><span class="stat__value" id="m-ontime">—</span><span class="stat__sub">على الموعد ±٣ د</span></div>
    <div class="stat"><span class="stat__label">انتهاكات السرعة</span><span class="stat__value" id="m-speed">—</span><span class="stat__sub">≥ ٧٠ كم/س داخل المدينة</span></div>
  </div>

  <section class="row">
    <div class="chart col-2">
      <h2>الرحلات خلال الأسبوع</h2>
      <svg id="trips-chart" viewBox="0 0 600 220" width="100%" height="220" aria-label="مخطط الرحلات"></svg>
    </div>
    <div class="chart">
      <h2>توزيع الإشغال</h2>
      <svg id="occ-chart" viewBox="0 0 220 220" width="100%" height="220" aria-label="مخطط الإشغال"></svg>
    </div>
  </section>

  <section class="row mt-4">
    <div class="chart col-2">
      <h2>أداء الخطوط</h2>
      <div id="route-table"></div>
    </div>
    <div class="chart">
      <h2>أكثر الحوادث شيوعاً</h2>
      <ul id="incident-list" style="padding-inline-start:var(--s-5);margin:0">
        <li class="muted">جارٍ التحميل…</li>
      </ul>
    </div>
  </section>
</main>

<script>
'use strict';
const $ = (s,r=document) => r.querySelector(s);
const API_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1') ? 'http://localhost:8000' : '';
const token = localStorage.getItem('dt_token') || sessionStorage.getItem('dt_token');
const arDigit = (n) => (n==null || isNaN(n)) ? '—' : Number(n).toLocaleString('ar-EG');

async function api(path) {
  try {
    const r = await fetch(API_BASE + path, { headers: token ? {'Authorization':'Bearer '+token} : {} });
    if (!r.ok) throw new Error();
    return await r.json();
  } catch (_) { return null; }
}

// ----- Filter pills -----
document.querySelectorAll('.filter-pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.filter-pill').forEach(o => o.classList.remove('is-active'));
    p.classList.add('is-active');
    loadAll(p.dataset.range);
  });
});

// ----- Bars chart (SVG, no library) -----
function drawBars(svgEl, values, labels) {
  while (svgEl.firstChild) svgEl.removeChild(svgEl.firstChild);
  const ns = 'http://www.w3.org/2000/svg';
  const W = 600, H = 220, P = 30;
  const max = Math.max(1, ...values);
  const bw = (W - P*2) / values.length * 0.7;
  values.forEach((v, i) => {
    const x = P + (i + .15) * ((W - P*2) / values.length);
    const h = ((H - P*2) * v / max);
    const y = H - P - h;
    const r = document.createElementNS(ns, 'rect');
    r.setAttribute('x', x); r.setAttribute('y', y);
    r.setAttribute('width', bw); r.setAttribute('height', h);
    r.setAttribute('rx', 6); r.setAttribute('fill', '#00876f');
    svgEl.appendChild(r);
    const t = document.createElementNS(ns,'text');
    t.setAttribute('x', x + bw/2); t.setAttribute('y', H - 8);
    t.setAttribute('text-anchor','middle'); t.setAttribute('font-size','11');
    t.setAttribute('fill','#6a7873');
    t.textContent = labels[i];
    svgEl.appendChild(t);
    const tv = document.createElementNS(ns,'text');
    tv.setAttribute('x', x + bw/2); tv.setAttribute('y', y - 4);
    tv.setAttribute('text-anchor','middle'); tv.setAttribute('font-size','11');
    tv.setAttribute('fill','#002623'); tv.setAttribute('font-weight','700');
    tv.textContent = arDigit(v);
    svgEl.appendChild(tv);
  });
}

// ----- Donut chart (SVG) -----
function drawDonut(svgEl, segs) {
  while (svgEl.firstChild) svgEl.removeChild(svgEl.firstChild);
  const ns = 'http://www.w3.org/2000/svg';
  const cx=110, cy=110, r=80, ir=50;
  const total = segs.reduce((s, x) => s + x.value, 0) || 1;
  let a = -Math.PI/2;
  segs.forEach(s => {
    const a2 = a + (s.value/total) * Math.PI*2;
    const large = (a2-a) > Math.PI ? 1 : 0;
    const x1 = cx + r*Math.cos(a), y1 = cy + r*Math.sin(a);
    const x2 = cx + r*Math.cos(a2), y2 = cy + r*Math.sin(a2);
    const ix1 = cx + ir*Math.cos(a2), iy1 = cy + ir*Math.sin(a2);
    const ix2 = cx + ir*Math.cos(a), iy2 = cy + ir*Math.sin(a);
    const path = document.createElementNS(ns,'path');
    path.setAttribute('d', `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${ix1} ${iy1} A ${ir} ${ir} 0 ${large} 0 ${ix2} ${iy2} Z`);
    path.setAttribute('fill', s.color);
    svgEl.appendChild(path);
    a = a2;
  });
  // legend
  let ly = 200;
  segs.forEach(s => {
    const sw = document.createElementNS(ns,'rect');
    sw.setAttribute('x', 6); sw.setAttribute('y', ly-10); sw.setAttribute('width', 10); sw.setAttribute('height', 10); sw.setAttribute('fill', s.color); sw.setAttribute('rx',2);
    svgEl.appendChild(sw);
    const t = document.createElementNS(ns,'text');
    t.setAttribute('x', 22); t.setAttribute('y', ly); t.setAttribute('font-size','12'); t.setAttribute('fill','#1a1a1a');
    t.textContent = s.label + ' — ' + Math.round(s.value/total*100) + '٪';
    svgEl.appendChild(t);
    ly += 16;
  });
}

// ----- Loaders -----
async function loadAll(range='7d') {
  const overview = await api('/api/admin/analytics/overview?range='+range) || {};

  $('#m-trips').textContent = arDigit(overview.trips_total);
  $('#m-trips-d').textContent = overview.trips_delta != null ? (overview.trips_delta>0?'+':'') + overview.trips_delta + ' مقارنة بالأسبوع السابق' : '—';
  $('#m-ontime').textContent = overview.on_time_pct != null ? Math.round(overview.on_time_pct)+'٪' : '—';
  $('#m-speed').textContent = arDigit(overview.speed_violations);

  // Trips per day — fall back to mock distribution if no data
  const labels = ['س','ح','إ','ث','أ','خ','ج'];
  const series = overview.trips_by_day || [120,140,180,160,210,190,205];
  drawBars($('#trips-chart'), series, labels);

  drawDonut($('#occ-chart'), overview.occupancy_buckets || [
    { label: 'فارغ <٢٠٪', value: 18, color: '#aedccc' },
    { label: 'متوسط', value: 52, color: '#00876f' },
    { label: 'ممتلئ >٨٠٪', value: 30, color: '#b97a14' },
  ]);

  const routes = await api('/api/routes') || [];
  $('#route-table').innerHTML = `
    <table style="width:100%;border-collapse:collapse">
      <thead><tr style="text-align:start;color:var(--color-text-mute);font-size:var(--fs-xs);text-transform:uppercase">
        <th style="padding:8px 4px">الخط</th><th style="padding:8px 4px">رحلات</th><th style="padding:8px 4px">دقة</th><th style="padding:8px 4px">إشغال</th>
      </tr></thead>
      <tbody>
      ${routes.slice(0,8).map(r => `
        <tr style="border-top:1px solid var(--color-border)">
          <td style="padding:10px 4px"><span class="badge badge--brand">${r.code || r.short_name || (r.id+'').slice(0,3)}</span> ${r.name_ar || r.name || ''}</td>
          <td style="padding:10px 4px">${arDigit(r.trips || Math.floor(Math.random()*80)+40)}</td>
          <td style="padding:10px 4px">${arDigit(r.on_time || Math.floor(Math.random()*15)+80)}٪</td>
          <td style="padding:10px 4px">${arDigit(r.occupancy || Math.floor(Math.random()*30)+40)}٪</td>
        </tr>`).join('')}
      </tbody>
    </table>
  `;

  $('#incident-list').innerHTML = (overview.incidents || [
    { type:'تأخر',     count: 12 },
    { type:'انحراف',   count: 7 },
    { type:'كثافة',    count: 4 },
    { type:'صيانة',    count: 2 },
  ]).map(x => `<li>${x.type} — <strong>${arDigit(x.count)}</strong></li>`).join('');
}

window.addEventListener('DOMContentLoaded', () => loadAll('7d'));
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0E5650">
<title>الموافقات — لوحة الإدارة — نقل دمشق</title>

<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@200;300;400;500;600;700&family=Source+Serif+4:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/lib/design-system.css">
<link rel="stylesheet" href="/admin/_layout.css">
<script src="/admin/_gate.js"></script>
</head>
<body data-page="approvals">

<!-- Universal utility bar -->
<div class="utility-bar">
  <div class="container">
    <span class="gov" data-i18n="hero.eyebrow">الجمهورية العربية السورية</span>
    <span class="right">
      <a href="/" data-i18n="header.home">الرئيسية</a>
      <span class="sep"></span>
      <a href="/passenger/" data-i18n="header.passenger">للركاب</a>
      <span class="sep"></span>
      <a href="/driver/" data-i18n="header.driver">للسائقين</a>
      <span class="sep"></span>
      <a href="/admin/login.html" data-i18n="header.admin">الإدارة</a>
    </span>
  </div>
</div>

<div class="admin-shell">

  <aside class="sidebar" aria-label="القائمة الجانبية">
    <a href="/" class="sidebar__brand">
      <span class="sidebar__brand-mark" aria-hidden="true">
        <picture>
          <source srcset="/assets/identity/sy-emblem-eagle.avif" type="image/avif">
          <img src="/assets/identity/sy-emblem-eagle.png" alt="">
        </picture>
      </span>
      <span class="sidebar__brand-text">
        <b data-i18n="admin.brand">نقل دمشق</b>
        <small data-i18n="admin.brandSub">لوحة الإدارة</small>
      </span>
    </a>

    <nav data-shell-nav aria-label="إدارة"></nav>

    <div class="sidebar__footer">
      <div class="sidebar__user">
        <div class="avatar-circle" id="user-initial">؟</div>
        <div>
          <div class="name" id="user-name">—</div>
          <div class="role" id="user-role">—</div>
        </div>
      </div>
      <button class="sidebar__logout" id="logout-btn" data-i18n="admin.logout">تسجيل الخروج</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="pagetitle">
        <h1 data-i18n="admin.approvals.title">موافقات تشغيل المركبات</h1>
        <p data-i18n="admin.approvals.sub">راجع طلبات المشغّلين واعتمد المركبات المسموح لها بالعمل. لا تعمل أي مركبة قبل موافقة الإدارة.</p>
      </div>
      <div class="cluster">
        <span class="badge badge--success"><span class="live-dot" aria-hidden="true"></span><span data-i18n="admin.live"> مباشر</span></span>
        <button class="lang-toggle" id="lang-toggle" data-i18n-toggle aria-label="Toggle language">EN</button>
      </div>
    </div>

    <div class="cluster" id="filters" role="tablist" style="margin-bottom:16px">
      <button class="btn btn--sm btn--primary" data-f="pending"><span class="flabel">قيد الانتظار</span> <b id="n-pending">·</b></button>
      <button class="btn btn--sm btn--outline" data-f="approved"><span class="flabel">معتمدة</span> <b id="n-approved">·</b></button>
      <button class="btn btn--sm btn--outline" data-f="rejected"><span class="flabel">مرفوضة</span> <b id="n-rejected">·</b></button>
      <button class="btn btn--sm btn--outline" data-f="suspended"><span class="flabel">معلّقة</span> <b id="n-suspended">·</b></button>
    </div>

    <section class="data-table-card">
      <table class="data-table" aria-label="approvals">
        <thead>
          <tr>
            <th data-i18n="admin.col.vehicle">المركبة</th>
            <th data-i18n="admin.col.type">النوع</th>
            <th data-i18n="admin.col.assignedDriver">السائق المعيّن</th>
            <th data-i18n="admin.col.capacity">السعة</th>
            <th data-i18n="admin.col.registered">سُجّلت</th>
            <th data-i18n="admin.col.note">ملاحظة</th>
            <th>—</th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="7"><div class="skeleton" style="width:100%;height:1.2em"></div></td></tr>
          <tr><td colspan="7"><div class="skeleton" style="width:100%;height:1.2em"></div></td></tr>
          <tr><td colspan="7"><div class="skeleton" style="width:100%;height:1.2em"></div></td></tr>
        </tbody>
      </table>
    </section>
  </main>

</div>

<script src="/lib/i18n.js"></script>
<script src="/admin/_shell.js" defer></script>
<script>
(function () {
  'use strict';
  let FILTER = 'pending';
  let ALL = [];
  const TYPE_AR = { bus: 'حافلة', microbus: 'ميكروباص', taxi: 'تكسي' };

  function isAr() { return (document.documentElement.lang || 'ar').slice(0,2) === 'ar'; }
  function esc(s) { return window.ADMIN_AUTH.esc(s); }
  function fmt(ts) {
    if (!ts) return '—';
    const d = new Date(ts);
    if (isNaN(d.getTime())) return '—';
    return d.toLocaleString(isAr() ? 'ar-SY' : 'en-GB', { dateStyle: 'medium', timeStyle: 'short' });
  }
  function stLabel(st) {
    const ar = { pending:'قيد الانتظار', approved:'معتمدة', rejected:'مرفوضة', suspended:'معلّقة' };
    const en = { pending:'Pending', approved:'Approved', rejected:'Rejected', suspended:'Suspended' };
    return (isAr() ? ar : en)[st] || st;
  }

  function counts() {
    const c = { pending:0, approved:0, rejected:0, suspended:0 };
    ALL.forEach(v => { const k = v.approval_status || 'approved'; if (c[k] != null) c[k]++; });
    Object.keys(c).forEach(k => {
      const el = document.getElementById('n-' + k);
      if (el) el.textContent = String(c[k]);
    });
  }

  function actionButtons(v) {
    const st = v.approval_status || 'approved';
    const b = (a, label, primary, danger) =>
      '<button class="btn btn--sm ' + (primary ? 'btn--primary' : 'btn--outline') + ' js-act" data-a="' + a +
      '" data-id="' + esc(v.id) + '"' + (danger ? ' style="color:var(--national-red-700);border-color:var(--national-red-500)"' : '') +
      '>' + label + '</button>';
    if (st === 'pending')
      return b('approve', isAr() ? 'اعتماد' : 'Approve', true) + ' ' + b('reject', isAr() ? 'رفض' : 'Reject', false, true);
    if (st === 'approved')
      return b('suspend', isAr() ? 'تعليق' : 'Suspend', false, true);
    if (st === 'suspended')
      return b('approve', isAr() ? 'اعتماد' : 'Approve', true) + ' ' + b('resubmit', isAr() ? 'إعادة للانتظار' : 'Re-queue', false);
    return b('resubmit', isAr() ? 'إعادة للانتظار' : 'Re-queue', false);
  }

  function filterLabels() {
    const ar = { pending:'قيد الانتظار', approved:'معتمدة', rejected:'مرفوضة', suspended:'معلّقة' };
    const en = { pending:'Pending', approved:'Approved', rejected:'Rejected', suspended:'Suspended' };
    const m = isAr() ? ar : en;
    document.querySelectorAll('#filters button[data-f]').forEach(b => {
      const lab = b.querySelector('.flabel');
      if (lab) lab.textContent = m[b.dataset.f] || b.dataset.f;
    });
  }

  function render() {
    const tbody = document.getElementById('rows');
    filterLabels();
    counts();
    const rows = ALL.filter(v => (v.approval_status || 'approved') === FILTER);
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state">' +
        (isAr() ? 'لا توجد مركبات في هذه الحالة.' : 'No vehicles in this state.') + '</div></td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(v => {
      const name = isAr() ? (v.name_ar || v.name) : (v.name || v.name_ar);
      const driver = v.driver_name
        ? esc(v.driver_name) + (v.driver_email ? ' <span class="cell-muted cell-mono">' + esc(v.driver_email) + '</span>' : '')
        : '<span class="status-pill is-warn">' + (isAr() ? 'بلا سائق' : 'no driver') + '</span>';
      return '<tr>' +
        '<td><span class="cell-mono">' + esc(v.vehicle_id || '—') + '</span> <span class="cell-muted">' + esc(name || '') + '</span></td>' +
        '<td class="cell-muted">' + esc(isAr() ? (TYPE_AR[v.vehicle_type] || v.vehicle_type) : v.vehicle_type) + '</td>' +
        '<td>' + driver + '</td>' +
        '<td>' + (v.capacity != null ? esc(v.capacity) : '—') + '</td>' +
        '<td class="cell-muted">' + esc(fmt(v.created_at)) + '</td>' +
        '<td class="cell-muted" style="max-width:220px">' + esc(v.approval_note || '—') + '</td>' +
        '<td style="white-space:nowrap">' + actionButtons(v) + '</td>' +
      '</tr>';
    }).join('');
    tbody.querySelectorAll('.js-act').forEach(b => b.addEventListener('click', onAction));
  }

  function onAction(ev) {
    const id = ev.currentTarget.dataset.id;
    const action = ev.currentTarget.dataset.a;
    let note = null;
    if (action === 'reject' || action === 'suspend') {
      note = prompt(isAr()
        ? (action === 'reject' ? 'سبب الرفض (سيظهر للمشغّل):' : 'سبب التعليق:')
        : (action === 'reject' ? 'Rejection reason (shown to the operator):' : 'Suspension reason:'));
      if (note === null) return;
    } else if (action === 'approve') {
      const v = ALL.find(x => x.id === id) || {};
      if (!confirm(isAr()
        ? 'اعتماد المركبة "' + (v.vehicle_id || id) + '" للعمل في الشبكة؟'
        : 'Approve vehicle "' + (v.vehicle_id || id) + '" to operate?')) return;
    }
    ev.currentTarget.disabled = true;
    window.ADMIN_AUTH.fetch('/api/admin/vehicles/' + encodeURIComponent(id) + '/approval', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: action, note: note || null }),
    }).then(r => {
      if (!r.ok) return r.json().then(j => { throw new Error(j.detail || 'Failed'); });
      window.ADMIN_AUTH.toast(
        action === 'approve' ? 'تم اعتماد المركبة' : action === 'reject' ? 'تم رفض المركبة' : 'تم تحديث الحالة',
        action === 'approve' ? 'Vehicle approved' : action === 'reject' ? 'Vehicle rejected' : 'Status updated',
        'success');
      load();
    }).catch(e => { window.ADMIN_AUTH.toast(e.message, e.message, 'error'); load(); });
  }

  function setFilter(f, btn) {
    FILTER = f;
    document.querySelectorAll('#filters .btn').forEach(x => {
      x.classList.toggle('btn--primary', x === btn);
      x.classList.toggle('btn--outline', x !== btn);
    });
    render();
  }

  function load() {
    if (!window.ADMIN_AUTH) return;
    window.ADMIN_AUTH.fetch('/api/admin/vehicles')
      .then(r => r.ok ? r.json() : Promise.reject(new Error('HTTP ' + r.status)))
      .then(rows => { ALL = Array.isArray(rows) ? rows : []; render(); })
      .catch(e => {
        if (String(e.message) !== 'unauthorized')
          document.getElementById('rows').innerHTML =
            '<tr><td colspan="7"><div class="empty-state">' + esc(e.message || 'Error') + '</div></td></tr>';
      });
  }

  document.addEventListener('DOMContentLoaded', function () {
    load();
    setInterval(load, 60000);
    document.getElementById('filters').addEventListener('click', function (ev) {
      const b = ev.target.closest('button[data-f]');
      if (b) setFilter(b.dataset.f, b);
    });
  });
  document.addEventListener('i18n:change', render);
})();
</script>
</body>
</html>

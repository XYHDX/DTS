<script src="/lib/i18n.js"></script>
<script src="/admin/_shell.js" defer></script>
<script>
(function () {
  function fmt(ts, lang) {
    if (!ts) return '—';
    const d = new Date(ts);
    if (isNaN(d.getTime())) return '—';
    return d.toLocaleString(lang === 'ar' ? 'ar-SY' : 'en-GB', { dateStyle: 'medium', timeStyle: 'short' });
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function sevClass(s) {
    if (s === 'critical' || s === 'high') return 'is-critical';
    if (s === 'medium') return 'is-warn';
    return 'is-offline';
  }

  let LAST = [];
  function render(rows) {
    const tbody = document.getElementById('rows');
    if (!rows || rows.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state">' +
        (window.I18N ? window.I18N.t('admin.alertsPage.empty') : 'No alerts.') + '</div></td></tr>';
      return;
    }
    const lang = (document.documentElement.lang || 'ar').slice(0,2);
    const isAr = lang === 'ar';
    const sevT = (s) => window.I18N ? window.I18N.t('admin.severity.' + (s || 'low')) : (s || '—');
    const openT = window.I18N ? window.I18N.t('admin.alertsPage.open') : 'Open';
    const resolvedT = window.I18N ? window.I18N.t('admin.alertsPage.resolved') : 'Resolved';
    const resolveBtnT = window.I18N ? window.I18N.t('admin.alertsPage.resolveBtn') : 'Mark resolved';

    tbody.innerHTML = rows.map(a => {
      const title = isAr ? (a.title_ar || a.title || '—') : (a.title || a.title_ar || '—');
      const resolved = a.is_resolved === true;
      // Resolve button only renders for open alerts. Resolved rows show a dash
      // so the column doesn't look broken on closed alerts.
      const actionCell = resolved
        ? '<td class="cell-muted">—</td>'
        : '<td><button class="btn btn--sm btn--outline btn-resolve" data-id="' + escapeHtml(a.id) + '">' + escapeHtml(resolveBtnT) + '</button></td>';
      return '<tr>' +
        '<td class="cell-muted">' + escapeHtml(fmt(a.created_at, lang)) + '</td>' +
        '<td>' + escapeHtml(a.alert_type || '—') + '</td>' +
        '<td><span class="status-pill ' + sevClass(a.severity) + '">' + escapeHtml(sevT(a.severity)) + '</span></td>' +
        '<td>' + escapeHtml(title) + '</td>' +
        '<td class="cell-mono">' + escapeHtml(a.vehicle_id || '—') + '</td>' +
        '<td><span class="status-pill ' + (resolved ? 'is-active' : 'is-warn') + '">' +
          escapeHtml(resolved ? resolvedT : openT) + '</span></td>' +
        actionCell +
      '</tr>';
    }).join('');

    // Wire the resolve buttons. Each click PATCHes the alert and reloads the
    // table. We disable the button while the request is in flight so the
    // user can't double-resolve.
    tbody.querySelectorAll('.btn-resolve').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.id;
        const original = btn.textContent;
        btn.disabled = true;
        btn.textContent = window.I18N ? window.I18N.t('common.loading') : '…';
        try {
          const r = await window.ADMIN_AUTH.fetch('/api/admin/alerts/' + encodeURIComponent(id) + '/resolve', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: '{}',
          });
          if (!r.ok) throw new Error('HTTP ' + r.status);
          await load();
        } catch (e) {
          if (String(e.message) !== 'unauthorized') {
            btn.disabled = false;
            btn.textContent = original;
            alert(window.I18N ? window.I18N.t('error.generic') : 'Error');
          }
        }
      });
    });
  }

  async function load() {
    if (!window.ADMIN_AUTH) return;
    try {
      const r = await window.ADMIN_AUTH.fetch('/api/admin/alerts?limit=200');
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const rows = await r.json();
      LAST = Array.isArray(rows) ? rows : [];
      render(LAST);
    } catch (e) {
      if (String(e.message) !== 'unauthorized') {
        document.getElementById('rows').innerHTML =
          '<tr><td colspan="7"><div class="empty-state">' + escapeHtml(e.message || 'Error') + '</div></td></tr>';
      }
    }
  }

  document.addEventListener('DOMContentLoaded', load);
  document.addEventListener('i18n:change', () => render(LAST));
})();
</script>

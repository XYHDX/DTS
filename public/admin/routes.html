<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0E5650">
<title>الخطوط — لوحة الإدارة — نقل دمشق</title>

<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@200;300;400;500;600;700&family=Source+Serif+4:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/lib/design-system.css">
<link rel="stylesheet" href="/admin/_layout.css">
<script src="/admin/_gate.js"></script>
<style>
  .data-table-card { background:var(--color-surface); border:1px solid var(--color-border); border-radius:var(--r-lg); overflow:auto; }
  .data-table { width:100%; border-collapse:collapse; font-size:var(--fs-sm); }
  .data-table th { text-align:start; padding:12px 14px; color:var(--color-text-mute); font-weight:600; border-bottom:1px solid var(--color-border); white-space:nowrap; }
  .data-table td { padding:11px 14px; border-bottom:1px solid var(--color-border); vertical-align:middle; }
  .data-table tr:last-child td { border-bottom:0; }
  .cell-mono { font-family:var(--font-mono); font-size:var(--fs-xs); }
  .cell-muted { color:var(--color-text-mute); }
  .status-pill { display:inline-block; padding:2px 10px; border-radius:999px; font-size:var(--fs-xs); font-weight:600; background:#e2e8f0; color:#334155; }
  .status-pill.is-active { background:var(--national-green-100); color:var(--national-green-800); }
  .status-pill.is-warn { background:#fef3c7; color:#92400e; }
  .status-pill.is-offline { background:#e2e8f0; color:#334155; }
  .status-pill.is-danger { background:var(--national-red-100); color:var(--national-red-900); }
  .empty-state { padding:40px 16px; text-align:center; color:var(--color-text-mute); }
  .btn-primary { padding:8px 14px; background:var(--national-green); color:#fff; border:0; border-radius:8px; cursor:pointer; font:inherit; font-size:var(--fs-sm); }
  .btn-row { background:transparent; border:0; cursor:pointer; font-size:13px; font-family:inherit; }
  .skeleton{position:relative;overflow:hidden;background:var(--color-surface-2);border-radius:6px}
  .skeleton::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);animation:sk 1.2s infinite}
  @keyframes sk{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
</style>
</head>
<body data-page="routes">

<div class="utility-bar">
  <div class="container">
    <span class="gov" data-i18n="hero.eyebrow">الجمهورية العربية السورية</span>
    <span class="right">
      <a href="/" data-i18n="header.home">الرئيسية</a>
      <span class="sep"></span>
      <a href="/passenger/" data-i18n="header.passenger">للركاب</a>
      <span class="sep"></span>
      <a href="/driver/" data-i18n="header.driver">للسائقين</a>
    </span>
  </div>
</div>

<div class="admin-shell">

  <aside class="sidebar" aria-label="القائمة الجانبية">
    <a href="/" class="sidebar__brand">
      <span class="sidebar__brand-mark" aria-hidden="true">
        <picture>
          <source srcset="/assets/identity/sy-emblem-eagle.avif" type="image/avif">
          <img src="/assets/identity/sy-emblem-eagle.png" alt="">
        </picture>
      </span>
      <span class="sidebar__brand-text">
        <b data-i18n="admin.brand">نقل دمشق</b>
        <small data-i18n="admin.brandSub">لوحة الإدارة</small>
      </span>
    </a>

    <nav data-shell-nav></nav>

    <div class="sidebar__footer">
      <div class="sidebar__user">
        <div class="avatar-circle" id="user-initial">؟</div>
        <div>
          <div class="name" id="user-name">—</div>
          <div class="role" id="user-role">—</div>
        </div>
      </div>
      <button class="sidebar__logout" id="logout-btn" data-i18n="admin.logout">تسجيل الخروج</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="pagetitle">
        <h1 data-i18n="admin.routes.title">الخطوط</h1>
        <p data-i18n="admin.routes.sub">خطوط الشبكة وأجرتها. مسار الخريطة (الهندسة) يُدار عبر GTFS وليس من هنا.</p>
      </div>
      <div class="cluster">
        <button id="btn-add" class="btn-primary" type="button">+ <span data-i18n="admin.routes.add">إضافة خط</span></button>
        <button class="lang-toggle" id="lang-toggle" data-i18n-toggle aria-label="Toggle language">EN</button>
      </div>
    </div>

    <section class="data-table-card">
      <table class="data-table" aria-label="routes">
        <thead>
          <tr>
            <th>الرمز</th>
            <th>الاسم</th>
            <th>النوع</th>
            <th>المسافة (كم)</th>
            <th>الأجرة (ل.س)</th>
            <th>الحالة</th>
            <th>—</th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="7"><div class="skeleton" style="width:100%;height:1.2em"></div></td></tr>
          <tr><td colspan="7"><div class="skeleton" style="width:100%;height:1.2em"></div></td></tr>
        </tbody>
      </table>
    </section>
  </main>

</div>

<script src="/lib/i18n.js"></script>
<script src="/lib/error-handler.js"></script>
<script src="/admin/_shell.js" defer></script>
<script>
(function () {
  'use strict';
  let LAST = [];
  function isAr(){ return (document.documentElement.lang||'ar').slice(0,2)==='ar'; }
  function esc(s){ return window.ADMIN_AUTH.esc(s); }
  const TYPE_AR = { bus:'حافلة', microbus:'ميكروباص', taxi:'تكسي' };
  function render(rows){
    const tbody = document.getElementById('rows');
    if (!rows.length){
      tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state">'+(isAr()?'لا خطوط بعد.':'No routes yet.')+'</div></td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(function(r){
      const name = isAr()?(r.name_ar||r.name||'—'):(r.name||r.name_ar||'—');
      const active = r.is_active !== false;
      return '<tr>'+
        '<td class="cell-mono"><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:'+esc(r.color||'#428177')+';margin-inline-end:6px"></span>'+esc(r.route_id||'—')+'</td>'+
        '<td>'+esc(name)+'</td>'+
        '<td class="cell-muted">'+esc(isAr()?(TYPE_AR[r.route_type]||r.route_type):(r.route_type||'bus'))+'</td>'+
        '<td>'+(r.distance_km!=null?esc(r.distance_km):'—')+'</td>'+
        '<td>'+(r.fare_syp!=null?esc(r.fare_syp):'—')+'</td>'+
        '<td><span class="status-pill '+(active?'is-active':'is-offline')+'">'+(active?(isAr()?'فعّال':'Active'):(isAr()?'موقوف':'Inactive'))+'</span></td>'+
        '<td><button class="btn-row js-edit" data-id="'+esc(r.id)+'" style="color:var(--national-green)">'+(isAr()?'تعديل':'Edit')+'</button></td>'+
      '</tr>';
    }).join('');
    tbody.querySelectorAll('.js-edit').forEach(b=>b.addEventListener('click', onEdit));
  }
  function onEdit(ev){
    const r = LAST.find(x=>x.id===ev.currentTarget.dataset.id);
    if (!r) return;
    window.ADMIN_AUTH.openForm({
      title: (isAr()?'تعديل الخط ':'Edit route ')+(r.route_id||''),
      fields: [
        { name:'name', label:'Name (English)', label_ar:'الاسم (إنجليزي)', value:r.name },
        { name:'name_ar', label:'Name (Arabic)', label_ar:'الاسم (عربي)', value:r.name_ar },
        { name:'fare_syp', label:'Fare (SYP)', label_ar:'الأجرة (ل.س)', type:'number', min:0, value:r.fare_syp },
        { name:'distance_km', label:'Distance (km)', label_ar:'المسافة (كم)', type:'number', min:0, step:'0.1', value:r.distance_km },
        { name:'avg_duration_min', label:'Avg duration (min)', label_ar:'مدة الرحلة (دقيقة)', type:'number', min:0, value:r.avg_duration_min },
        { name:'is_active', label:'Status', label_ar:'الحالة', type:'select', value:String(r.is_active!==false),
          options:[{value:'true',label:'Active',label_ar:'فعّال'},{value:'false',label:'Inactive',label_ar:'موقوف'}]},
      ],
      onSubmit: async function(values){
        const body = {};
        ['name','name_ar'].forEach(k=>{ if(values[k]) body[k]=values[k]; });
        ['fare_syp','distance_km','avg_duration_min'].forEach(k=>{ if(values[k]!=null&&values[k]!=='') body[k]=Number(values[k]); });
        body.is_active = values.is_active === 'true';
        const resp = await window.ADMIN_AUTH.fetch('/api/admin/routes/'+encodeURIComponent(r.id), {
          method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
        });
        if (!resp.ok){ const j = await resp.json().catch(()=>({detail:'Failed'})); return {error:j.detail||'Failed'}; }
        window.ADMIN_AUTH.toast('تم حفظ الخط','Route saved','success');
      },
      onAfter: load,
    });
  }
  function openAddForm(){
    window.ADMIN_AUTH.openForm({
      title: isAr()?'إضافة خط جديد':'Add new route',
      subtitle: isAr()?'نوع المركبات على الخط يجب أن يطابق نوع الخط.':'Vehicle type on the line must match the route type.',
      fields: [
        { name:'route_id', label:'Code', label_ar:'الرمز', required:true, placeholder:'R009' },
        { name:'name', label:'Name (English)', label_ar:'الاسم (إنجليزي)', required:true, placeholder:'Marjeh → Mezzeh' },
        { name:'name_ar', label:'Name (Arabic)', label_ar:'الاسم (عربي)', required:true, placeholder:'المرجة → المزة' },
        { name:'route_type', label:'Type', label_ar:'النوع', type:'select', required:true, value:'bus',
          options:[{value:'bus',label:'Bus',label_ar:'حافلة'},{value:'microbus',label:'Microbus',label_ar:'ميكروباص'},{value:'taxi',label:'Taxi',label_ar:'تكسي'}]},
        { name:'fare_syp', label:'Fare (SYP)', label_ar:'الأجرة (ل.س)', type:'number', min:0, value:5000 },
        { name:'distance_km', label:'Distance (km)', label_ar:'المسافة (كم)', type:'number', min:0, step:'0.1' },
        { name:'avg_duration_min', label:'Avg duration (min)', label_ar:'مدة الرحلة (دقيقة)', type:'number', min:0 },
      ],
      onSubmit: async function(values){
        ['fare_syp','distance_km','avg_duration_min'].forEach(k=>{ if(values[k]==null||values[k]==='') delete values[k]; else values[k]=Number(values[k]); });
        const r = await window.ADMIN_AUTH.fetch('/api/admin/routes', {
          method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(values)
        });
        if (!r.ok){ const j = await r.json().catch(()=>({detail:'Save failed'})); return {error:j.detail||'Save failed'}; }
        window.ADMIN_AUTH.toast('تم إنشاء الخط','Route created','success');
      },
      onAfter: load,
    });
  }
  function load(){
    if (!window.ADMIN_AUTH) return;
    window.ADMIN_AUTH.fetch('/api/admin/routes')
      .then(r=>r.ok?r.json():Promise.reject(new Error('HTTP '+r.status)))
      .then(rows=>{ LAST = Array.isArray(rows)?rows:[]; render(LAST); })
      .catch(e=>{
        if (String(e.message)!=='unauthorized')
          document.getElementById('rows').innerHTML='<tr><td colspan="7"><div class="empty-state">'+esc(e.message||'Error')+'</div></td></tr>';
      });
  }
  document.addEventListener('DOMContentLoaded', function(){
    load();
    const btn = document.getElementById('btn-add');
    if (btn) btn.addEventListener('click', openAddForm);
  });
  document.addEventListener('i18n:change', ()=>render(LAST));
})();
</script>
</body>
</html>

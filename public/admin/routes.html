<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0E5650">
<title>الخطوط — لوحة الإدارة — نقل دمشق</title>

<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@200;300;400;500;600;700&family=Source+Serif+4:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/lib/design-system.css">
<link rel="stylesheet" href="/admin/_layout.css">
<script src="/admin/_gate.js"></script>
</head>
<body data-page="routes">

<div class="utility-bar">
  <div class="container">
    <span class="gov" data-i18n="hero.eyebrow">الجمهورية العربية السورية</span>
    <span class="right">
      <a href="/" data-i18n="header.home">الرئيسية</a>
      <span class="sep"></span>
      <a href="/passenger/" data-i18n="header.passenger">للركاب</a>
      <span class="sep"></span>
      <a href="/driver/" data-i18n="header.driver">للسائقين</a>
      <span class="sep"></span>
      <a href="/admin/login.html" data-i18n="header.admin">الإدارة</a>
    </span>
  </div>
</div>

<div class="admin-shell">

  <aside class="sidebar" aria-label="القائمة الجانبية">
    <a href="/" class="sidebar__brand">
      <span class="sidebar__brand-mark" aria-hidden="true">
        <picture><source srcset="/assets/identity/sy-emblem-eagle.avif" type="image/avif"><img src="/assets/identity/sy-emblem-eagle.png" alt=""></picture>
      </span>
      <span class="sidebar__brand-text"><b data-i18n="admin.brand">نقل دمشق</b><small data-i18n="admin.brandSub">لوحة الإدارة</small></span>
    </a>

    <nav data-shell-nav aria-label="إدارة"></nav>

    <div class="sidebar__footer">
      <div class="sidebar__user"><div class="avatar-circle" id="user-initial">؟</div><div><div class="name" id="user-name">—</div><div class="role" id="user-role">—</div></div></div>
      <button class="sidebar__logout" id="logout-btn" data-i18n="admin.logout">تسجيل الخروج</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="pagetitle">
        <h1 data-i18n="admin.routes.title">الخطوط</h1>
        <p data-i18n="admin.routes.sub">خطوط النقل العام في دمشق، ملوّنة حسب نوع المركبة.</p>
        <div class="route-legend" style="display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;font-size:13px;color:var(--color-text-soft,#555)">
          <span style="display:inline-flex;align-items:center;gap:6px"><span style="width:12px;height:12px;border-radius:3px;background:#0E5650;display:inline-block"></span><span data-i18n="admin.routes.legendBus">حافلة</span></span>
          <span style="display:inline-flex;align-items:center;gap:6px"><span style="width:12px;height:12px;border-radius:3px;background:#C9A227;display:inline-block"></span><span data-i18n="admin.routes.legendMicro">ميكروباص</span></span>
          <span style="display:inline-flex;align-items:center;gap:6px"><span style="width:12px;height:12px;border-radius:3px;background:#CE1126;display:inline-block"></span><span data-i18n="admin.routes.legendTaxi">تكسي</span></span>
        </div>
      </div>
      <div class="cluster">
        <button id="btn-add-route" type="button" data-i18n="admin.routes.add" style="padding:8px 14px;background:#0E5650;color:#fff;border:0;border-radius:8px;cursor:pointer;">+ إضافة خط</button>
        <button class="lang-toggle" id="lang-toggle" data-i18n-toggle aria-label="Toggle language">EN</button>
      </div>
    </div>

    <section class="data-table-card">
      <table class="data-table" aria-label="routes">
        <thead>
          <tr>
            <th data-i18n="admin.routes.color">اللون</th>
            <th data-i18n="admin.routes.type">النوع</th>
            <th data-i18n="admin.routes.short">رمز الخط</th>
            <th data-i18n="admin.routes.name">الاسم</th>
            <th data-i18n="admin.routes.stops">عدد المحطات</th>
            <th data-i18n="admin.routes.vehicles">الحافلات</th>
            <th data-i18n="admin.routes.status">الحالة</th>
            <th>—</th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="8"><div class="skeleton" style="width:100%;height:1.2em"></div></td></tr>
          <tr><td colspan="8"><div class="skeleton" style="width:100%;height:1.2em"></div></td></tr>
        </tbody>
      </table>
    </section>
  </main>
</div>

<script src="/lib/i18n.js"></script>
<script src="/admin/_shell.js" defer></script>
<script>
(function () {
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // Routes are coloured by vehicle type for an at-a-glance read of the network:
  // green = bus, gold = microbus, red = taxi (the national palette).
  const TYPE_COLORS = { bus: '#0E5650', microbus: '#C9A227', taxi: '#CE1126' };
  const TYPE_LABELS = {
    bus:      { ar: 'حافلة',   en: 'Bus' },
    microbus: { ar: 'ميكروباص', en: 'Microbus' },
    taxi:     { ar: 'تكسي',    en: 'Taxi' },
  };
  function typeColor(t) { return TYPE_COLORS[t] || '#0E5650'; }
  function typeLabel(t, isAr) { const l = TYPE_LABELS[t]; return l ? (isAr ? l.ar : l.en) : (t || '—'); }

  let DATA = { routes: [], vehicles: [] };
  function render() {
    const tbody = document.getElementById('rows');
    const routes = DATA.routes;
    if (!routes || routes.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state">' +
        (window.I18N ? window.I18N.t('admin.routes.empty') : 'No routes yet.') + '</div></td></tr>';
      return;
    }
    const isAr = (document.documentElement.lang || 'ar').slice(0,2) === 'ar';
    const activeT = window.I18N ? window.I18N.t('admin.users.active') : 'Active';
    const inactiveT = window.I18N ? window.I18N.t('admin.users.inactive') : 'Inactive';

    // Count vehicles per route
    const countByRoute = {};
    (DATA.vehicles || []).forEach(v => {
      const rid = v.assigned_route_id;
      if (rid) countByRoute[rid] = (countByRoute[rid] || 0) + 1;
    });

    const canEdit = window.ADMIN_AUTH && window.ADMIN_AUTH.isAdmin();
    tbody.innerHTML = routes.map(r => {
      const name = isAr ? (r.name_ar || r.name || '—') : (r.name || r.name_ar || '—');
      const isActive = r.is_active !== false;
      const stops = (r.stop_ids && r.stop_ids.length) || r.stops_count || '—';
      const count = countByRoute[r.id] || 0;
      const rtype = r.route_type || 'bus';
      const color = typeColor(rtype);
      const actions = canEdit
        ? '<button class="js-del" data-id="' + escapeHtml(r.id || '') + '" style="background:transparent;border:0;color:#b91c1c;cursor:pointer;font-size:13px;">' + (isAr ? 'حذف' : 'Delete') + '</button>'
        : '<span class="cell-muted">—</span>';
      return '<tr>' +
        '<td><span class="cell-color" style="background:' + escapeHtml(color) + '"></span></td>' +
        '<td>' + escapeHtml(typeLabel(rtype, isAr)) + '</td>' +
        '<td class="cell-mono">' + escapeHtml(r.route_id || r.short_name || r.code || '—') + '</td>' +
        '<td>' + escapeHtml(name) + '</td>' +
        '<td>' + stops + '</td>' +
        '<td>' + count + '</td>' +
        '<td><span class="status-pill ' + (isActive ? 'is-active' : 'is-offline') + '">' +
          escapeHtml(isActive ? activeT : inactiveT) + '</span></td>' +
        '<td>' + actions + '</td>' +
      '</tr>';
    }).join('');
    tbody.querySelectorAll('.js-del').forEach(b => b.addEventListener('click', onDelete));
  }
  function onDelete(ev) {
    const id = ev.currentTarget.getAttribute('data-id');
    if (!id) return;
    const isAr = (document.documentElement.lang || 'ar').slice(0,2) === 'ar';
    if (!confirm(isAr ? 'تأكيد إيقاف هذا الخط؟' : 'Deactivate this route?')) return;
    window.ADMIN_AUTH.fetch('/api/admin/routes/' + encodeURIComponent(id), {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ is_active: false }),
    })
      .then(r => { if (!r.ok) return r.json().then(j => { throw new Error(j.detail || 'Deactivate failed'); }); load(); })
      .catch(e => alert(e.message));
  }
  function openAddForm() {
    const isAr = (document.documentElement.lang || 'ar').slice(0,2) === 'ar';
    window.ADMIN_AUTH.openForm({
      title:    isAr ? 'إضافة خط جديد' : 'Add new route',
      subtitle: isAr ? 'الرمز فريد. لون الخط يُحدّد تلقائياً حسب نوع المركبة.' : 'Code is unique. The route colour is set automatically by vehicle type.',
      fields: [
        { name:'route_id', label:'Route code', label_ar:'رمز الخط', required:true, placeholder:'R103' },
        { name:'name',     label:'Name (English)', label_ar:'الاسم (إنجليزي)', required:true, placeholder:'Baramkeh → Mezzeh' },
        { name:'name_ar',  label:'Name (Arabic)',  label_ar:'الاسم (عربي)',  required:true, placeholder:'البرامكة → المزة' },
        { name:'route_type', label:'Type (sets colour)', label_ar:'النوع (يحدّد اللون)', type:'select', required:true, value:'bus',
          options:[{value:'bus',label:'Bus · green',label_ar:'حافلة · أخضر'},{value:'microbus',label:'Microbus · gold',label_ar:'ميكروباص · ذهبي'},{value:'taxi',label:'Taxi · red',label_ar:'تكسي · أحمر'}]},
        { name:'distance_km', label:'Distance (km)', label_ar:'المسافة (كم)', type:'number', step:'0.1', min:0, max:500, value:5 },
        { name:'avg_duration_min', label:'Avg duration (min)', label_ar:'المدة الوسطية (دقيقة)', type:'number', min:0, max:600, value:25 },
        { name:'fare_syp', label:'Fare (SYP)', label_ar:'الأجرة (ل.س)', type:'number', min:0, max:100000, value:500 },
      ],
      onSubmit: async function (values) {
        // Colour follows vehicle type (green/gold/red) so the map stays consistent.
        values.color = typeColor(values.route_type);
        const r = await window.ADMIN_AUTH.fetch('/api/admin/routes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(values),
        });
        if (!r.ok) {
          const j = await r.json().catch(()=>({detail:'Save failed'}));
          return { error: j.detail || 'Save failed' };
        }
      },
      onAfter: load,
    });
  }

  function load() {
    if (!window.ADMIN_AUTH) return;
    Promise.all([
      window.ADMIN_AUTH.fetch('/api/admin/routes').then(r => r.ok ? r.json() : fetch('/api/routes').then(rr => rr.json())),
      window.ADMIN_AUTH.fetch('/api/vehicles').then(r => r.json()).catch(() => []),
    ]).then(([routes, vehicles]) => {
      DATA = { routes: Array.isArray(routes) ? routes : [], vehicles: Array.isArray(vehicles) ? vehicles : [] };
      render();
    }).catch(e => {
      if (String(e.message) !== 'unauthorized') {
        document.getElementById('rows').innerHTML =
          '<tr><td colspan="7"><div class="empty-state">' + escapeHtml(e.message || 'Error') + '</div></td></tr>';
      }
    });
  }

  document.addEventListener('DOMContentLoaded', function () {
    load();
    const btn = document.getElementById('btn-add-route');
    if (btn) {
      btn.addEventListener('click', openAddForm);
    }
  });
  document.addEventListener('i18n:change', render);
})();
</script>
</body>
</html>

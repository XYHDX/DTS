<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0E5650">
<title>سجلّ المراجعة — نقل دمشق</title>

<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/lib/design-system.css">
<link rel="stylesheet" href="/admin/_layout.css">
<script src="/admin/_gate.js"></script>
<style>
  .filter-row { display: flex; gap: 8px; margin: 12px 0 16px; flex-wrap: wrap; }
  .filter-row input, .filter-row select {
    padding: 8px 12px; border: 1px solid var(--rule); border-radius: 8px; font: inherit;
  }
  .filter-row button {
    padding: 8px 14px; background: #0E5650; color: #fff; border: 0; border-radius: 8px; cursor: pointer; font: inherit;
  }
  .details-cell { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #475569; max-width: 360px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .action-pill { font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 2px 8px; border-radius: 999px; background: #f1f5f9; color: #0f172a; }
  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--rule); margin-bottom: 14px; }
  .tabs button { background: transparent; border: 0; padding: 10px 14px; cursor: pointer; font: inherit; border-bottom: 2px solid transparent; color: #64748b; }
  .tabs button.is-active { color: #0E5650; border-bottom-color: #0E5650; font-weight: 600; }
</style>
</head>
<body data-page="audit">
<noscript><div style="margin:0;padding:14px 18px;background:#9b121e;color:#fff;font-family:system-ui,sans-serif;font-size:14px;text-align:center;">يتطلب هذا التطبيق تفعيل جافاسكربت للعمل. · This app requires JavaScript to be enabled.</div></noscript>

<div class="utility-bar">
  <div class="container">
    <span class="gov" data-i18n="hero.eyebrow">الجمهورية العربية السورية</span>
    <span class="right">
      <a href="/" data-i18n="header.home">الرئيسية</a><span class="sep"></span>
      <a href="/passenger/" data-i18n="header.passenger">للركاب</a><span class="sep"></span>
      <a href="/driver/" data-i18n="header.driver">للسائقين</a><span class="sep"></span>
      <a href="/admin/login.html" data-i18n="header.admin">الإدارة</a>
      <span class="sep"></span>
      <button class="utility-lang" id="lang-toggle" data-i18n-toggle data-i18n="header.toggleLang" aria-label="Toggle language">EN</button>
    </span>
  </div>
</div>

<div class="admin-shell">
  <aside class="sidebar">
    <a href="/" class="sidebar__brand">
      <span class="sidebar__brand-mark"><picture><source srcset="/assets/identity/sy-emblem-eagle.avif" type="image/avif"><img src="/assets/identity/sy-emblem-eagle.png" alt=""></picture></span>
      <span class="sidebar__brand-text"><b data-i18n="admin.brand">نقل دمشق</b><small data-i18n="admin.brandSub">لوحة الإدارة</small></span>
    </a>
    <nav data-shell-nav aria-label="إدارة"></nav>
    <div class="sidebar__footer">
      <div class="sidebar__user"><div class="avatar-circle" id="user-initial">؟</div><div><div class="name" id="user-name">—</div><div class="role" id="user-role">—</div></div></div>
      <button class="sidebar__logout" id="logout-btn">تسجيل الخروج</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="pagetitle">
        <h1 data-i18n="admin.audit.title">السجل</h1>
        <p data-i18n="admin.audit.sub">كل إجراء إداري وكل محاولة دخول. للمسؤولين فقط — مرئيّة ضمن نطاق المُشغّل الحالي.</p>
      </div>
      <div class="cluster">
      </div>
    </div>

    <div class="tabs" id="tabs">
      <button data-tab="audit"   class="is-active" data-i18n="admin.audit.tabActions">الإجراءات</button>
      <button data-tab="logins" data-i18n="admin.audit.tabLogins">محاولات الدخول</button>
    </div>

    <div class="filter-row" id="filter-row">
      <input id="filter-input" data-i18n-placeholder="admin.audit.search" placeholder="إجراء أو بريد…" style="min-width:240px;">
      <button id="filter-go" data-i18n="admin.audit.filter">تصفية</button>
      <button id="filter-clear" data-i18n="admin.audit.clear" style="background:#fff;color:#0E5650;border:1px solid #0E5650;">إلغاء</button>
    </div>

    <section class="data-table-card">
      <table class="data-table">
        <thead id="thead"></thead>
        <tbody id="rows">
          <tr><td colspan="5"><div class="skeleton" style="width:100%;height:1.2em"></div></td></tr>
        </tbody>
      </table>
    </section>
  </main>
</div>

<script src="/lib/i18n.js"></script>
<script src="/admin/_shell.js" defer></script>
<script>
(function () {
  'use strict';
  let TAB = 'audit', FILTER = '', LAST = [], PAGER = null;
  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const isAr = () => (document.documentElement.lang || 'ar').slice(0, 2) === 'ar';
  function fmtTs(s) {
    if (!s) return '—';
    const d = new Date(s);
    if (isNaN(d.getTime())) return '—';
    return d.toLocaleString(isAr() ? 'ar-SY' : 'en-GB', { dateStyle: 'short', timeStyle: 'medium' });
  }
  function setHead() {
    const tr = document.getElementById('thead');
    if (TAB === 'audit') {
      tr.innerHTML = isAr()
        ? '<tr><th>الوقت</th><th>الإجراء</th><th>الكيان</th><th>المعرّف</th><th>تفاصيل</th></tr>'
        : '<tr><th>Time</th><th>Action</th><th>Entity</th><th>ID</th><th>Details</th></tr>';
    } else {
      tr.innerHTML = isAr()
        ? '<tr><th>الوقت</th><th>البريد</th><th>الحالة</th><th>IP</th><th>السبب</th></tr>'
        : '<tr><th>Time</th><th>Email</th><th>Status</th><th>IP</th><th>Reason</th></tr>';
    }
  }
  function render(rows) {
    const tbody = document.getElementById('rows');
    if (!rows || !rows.length) {
      tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state">' + (isAr() ? 'لا توجد سجلات بهذا الفلتر.' : 'No rows match this filter.') + '</div></td></tr>';
      return;
    }
    if (TAB === 'audit') {
      tbody.innerHTML = rows.map(r => {
        const det = r.details ? JSON.stringify(r.details) : '';
        return '<tr>' +
          '<td>' + esc(fmtTs(r.created_at)) + '</td>' +
          '<td><span class="action-pill">' + esc(r.action || '') + '</span></td>' +
          '<td>' + esc(r.entity_type || '—') + '</td>' +
          '<td class="cell-mono">' + esc((r.entity_id || '').slice(0,8)) + '</td>' +
          '<td class="details-cell" title="' + esc(det) + '">' + esc(det) + '</td>' +
        '</tr>';
      }).join('');
    } else {
      tbody.innerHTML = rows.map(r => {
        const status = r.success
          ? '<span class="status-pill is-active">success</span>'
          : '<span class="status-pill is-offline">fail</span>';
        return '<tr>' +
          '<td>' + esc(fmtTs(r.attempted_at)) + '</td>' +
          '<td class="cell-mono">' + esc(r.email || '') + '</td>' +
          '<td>' + status + '</td>' +
          '<td class="cell-mono">' + esc(r.ip_address || '—') + '</td>' +
          '<td class="cell-muted">' + esc(r.reason || '—') + '</td>' +
        '</tr>';
      }).join('');
    }
  }
  async function load() {
    if (!window.ADMIN_AUTH) return;
    const url = TAB === 'audit'
      ? '/api/admin/audit-log?limit=200' + (FILTER ? '&action=' + encodeURIComponent(FILTER) : '')
      : '/api/admin/login_attempts?limit=200' + (FILTER ? '&email=' + encodeURIComponent(FILTER) : '');
    try {
      const r = await window.ADMIN_AUTH.fetch(url);
      if (!r.ok) {
        if (r.status === 403) { document.getElementById('rows').innerHTML = '<tr><td colspan="5"><div class="empty-state">403 — Admin role only.</div></td></tr>'; return; }
        throw new Error('HTTP ' + r.status);
      }
      const data = await r.json();
      LAST = Array.isArray(data) ? data : [];
      if (PAGER) PAGER.set(LAST); else render(LAST);
    } catch (e) {
      if (String(e.message) !== 'unauthorized') {
        document.getElementById('rows').innerHTML = '<tr><td colspan="5"><div class="empty-state">' + esc(e.message) + '</div></td></tr>';
      }
    }
  }
  document.addEventListener('DOMContentLoaded', function () {
    PAGER = window.ADMIN_AUTH.pager({ render: render, pageSize: 15, mountAfter: '.data-table-card' });
    setHead(); load();
    document.querySelectorAll('#tabs button').forEach(b => b.addEventListener('click', () => {
      document.querySelectorAll('#tabs button').forEach(x => x.classList.remove('is-active'));
      b.classList.add('is-active');
      TAB = b.dataset.tab; FILTER = ''; document.getElementById('filter-input').value = '';
      setHead(); load();
    }));
    document.getElementById('filter-go').addEventListener('click', () => {
      FILTER = (document.getElementById('filter-input').value || '').trim();
      load();
    });
    document.getElementById('filter-clear').addEventListener('click', () => {
      FILTER = ''; document.getElementById('filter-input').value = ''; load();
    });
    setInterval(load, 30000);  // auto-refresh
    document.addEventListener('i18n:change', () => { setHead(); load(); });
  });
})();
</script>
</body>
</html>

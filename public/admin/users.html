<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0E5650">
<title>المستخدمون — لوحة الإدارة — نقل دمشق</title>

<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@200;300;400;500;600;700&family=Source+Serif+4:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/lib/design-system.css">
<link rel="stylesheet" href="/admin/_layout.css">
<script src="/admin/_gate.js"></script>
<style>
  .data-table-card { background:var(--color-surface); border:1px solid var(--color-border); border-radius:var(--r-lg); overflow:auto; }
  .data-table { width:100%; border-collapse:collapse; font-size:var(--fs-sm); }
  .data-table th { text-align:start; padding:12px 14px; color:var(--color-text-mute); font-weight:600; border-bottom:1px solid var(--color-border); white-space:nowrap; }
  .data-table td { padding:11px 14px; border-bottom:1px solid var(--color-border); vertical-align:middle; }
  .data-table tr:last-child td { border-bottom:0; }
  .cell-mono { font-family:var(--font-mono); font-size:var(--fs-xs); }
  .cell-muted { color:var(--color-text-mute); }
  .status-pill { display:inline-block; padding:2px 10px; border-radius:999px; font-size:var(--fs-xs); font-weight:600; background:#e2e8f0; color:#334155; }
  .status-pill.is-active { background:var(--national-green-100); color:var(--national-green-800); }
  .status-pill.is-warn { background:#fef3c7; color:#92400e; }
  .status-pill.is-offline { background:#e2e8f0; color:#334155; }
  .status-pill.is-danger { background:var(--national-red-100); color:var(--national-red-900); }
  .empty-state { padding:40px 16px; text-align:center; color:var(--color-text-mute); }
  .btn-primary { padding:8px 14px; background:var(--national-green); color:#fff; border:0; border-radius:8px; cursor:pointer; font:inherit; font-size:var(--fs-sm); }
  .btn-row { background:transparent; border:0; cursor:pointer; font-size:13px; font-family:inherit; }
  .skeleton{position:relative;overflow:hidden;background:var(--color-surface-2);border-radius:6px}
  .skeleton::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);animation:sk 1.2s infinite}
  @keyframes sk{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
</style>
</head>
<body data-page="users">

<div class="utility-bar">
  <div class="container">
    <span class="gov" data-i18n="hero.eyebrow">الجمهورية العربية السورية</span>
    <span class="right">
      <a href="/" data-i18n="header.home">الرئيسية</a>
      <span class="sep"></span>
      <a href="/passenger/" data-i18n="header.passenger">للركاب</a>
      <span class="sep"></span>
      <a href="/driver/" data-i18n="header.driver">للسائقين</a>
    </span>
  </div>
</div>

<div class="admin-shell">

  <aside class="sidebar" aria-label="القائمة الجانبية">
    <a href="/" class="sidebar__brand">
      <span class="sidebar__brand-mark" aria-hidden="true">
        <picture>
          <source srcset="/assets/identity/sy-emblem-eagle.avif" type="image/avif">
          <img src="/assets/identity/sy-emblem-eagle.png" alt="">
        </picture>
      </span>
      <span class="sidebar__brand-text">
        <b data-i18n="admin.brand">نقل دمشق</b>
        <small data-i18n="admin.brandSub">لوحة الإدارة</small>
      </span>
    </a>

    <nav data-shell-nav></nav>

    <div class="sidebar__footer">
      <div class="sidebar__user">
        <div class="avatar-circle" id="user-initial">؟</div>
        <div>
          <div class="name" id="user-name">—</div>
          <div class="role" id="user-role">—</div>
        </div>
      </div>
      <button class="sidebar__logout" id="logout-btn" data-i18n="admin.logout">تسجيل الخروج</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="pagetitle">
        <h1 data-i18n="admin.users.title">المستخدمون</h1>
        <p data-i18n="admin.users.sub">أنشئ حسابات السائقين (اسم مستخدم + كلمة مرور) واربطهم بالمركبات. المشغّل ينشئ السائقين فقط.</p>
      </div>
      <div class="cluster">
        <button id="btn-add" class="btn-primary" type="button">+ <span data-i18n="admin.users.add">إضافة مستخدم</span></button>
        <button class="lang-toggle" id="lang-toggle" data-i18n-toggle aria-label="Toggle language">EN</button>
      </div>
    </div>

    <section class="data-table-card">
      <table class="data-table" aria-label="users">
        <thead>
          <tr>
            <th data-i18n="admin.users.name">الاسم</th>
            <th data-i18n="admin.users.email">البريد الإلكتروني</th>
            <th data-i18n="admin.users.role">الصلاحية</th>
            <th data-i18n="admin.users.statusCol">الحالة</th>
            <th>الهاتف</th>
            <th>—</th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="6"><div class="skeleton" style="width:100%;height:1.2em"></div></td></tr>
          <tr><td colspan="6"><div class="skeleton" style="width:100%;height:1.2em"></div></td></tr>
        </tbody>
      </table>
    </section>
  </main>

</div>

<script src="/lib/i18n.js"></script>
<script src="/lib/error-handler.js"></script>
<script src="/admin/_shell.js" defer></script>
<script>
(function () {
  'use strict';
  let LAST = [];
  function isAr(){ return (document.documentElement.lang||'ar').slice(0,2)==='ar'; }
  function esc(s){ return window.ADMIN_AUTH.esc(s); }
  const ROLE_AR = { admin:'مدير', dispatcher:'مشغّل', driver:'سائق', viewer:'مشاهد', super_admin:'مدير عام' };
  function render(rows){
    const tbody = document.getElementById('rows');
    if (!rows.length){
      tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state">'+(isAr()?'لا مستخدمين بعد.':'No users yet.')+'</div></td></tr>';
      return;
    }
    const canEdit = window.ADMIN_AUTH.isAdmin();
    tbody.innerHTML = rows.map(function(u){
      const name = isAr()?(u.full_name_ar||u.full_name||'—'):(u.full_name||'—');
      const isActive = u.is_active !== false;
      const actions = canEdit
        ? (isActive
            ? '<button class="btn-row js-toggle" data-id="'+esc(u.id)+'" data-to="false" style="color:#b91c1c">'+(isAr()?'تعطيل':'Disable')+'</button>'
            : '<button class="btn-row js-toggle" data-id="'+esc(u.id)+'" data-to="true" style="color:var(--national-green)">'+(isAr()?'تفعيل':'Enable')+'</button>')
        : '<span class="cell-muted">—</span>';
      return '<tr>'+
        '<td>'+esc(name)+'</td>'+
        '<td class="cell-mono">'+esc(u.email||'—')+'</td>'+
        '<td>'+esc(isAr()?(ROLE_AR[u.role]||u.role):(u.role||'—'))+'</td>'+
        '<td><span class="status-pill '+(isActive?'is-active':'is-offline')+'">'+(isActive?(isAr()?'نشط':'Active'):(isAr()?'معطّل':'Disabled'))+'</span></td>'+
        '<td class="cell-muted">'+esc(u.phone||'—')+'</td>'+
        '<td>'+actions+'</td>'+
      '</tr>';
    }).join('');
    tbody.querySelectorAll('.js-toggle').forEach(b=>b.addEventListener('click', onToggle));
  }
  function onToggle(ev){
    const id = ev.currentTarget.dataset.id;
    const to = ev.currentTarget.dataset.to === 'true';
    if (!to && !confirm(isAr()?'تعطيل هذا الحساب؟ سيُرفض دخوله فوراً.':'Disable this account? Login is revoked immediately.')) return;
    window.ADMIN_AUTH.fetch('/api/admin/users/'+encodeURIComponent(id), {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ is_active: to })
    }).then(r=>{ if(!r.ok) return r.json().then(j=>{throw new Error(j.detail||'Failed');});
      window.ADMIN_AUTH.toast(to?'تم تفعيل الحساب':'تم تعطيل الحساب', to?'Account enabled':'Account disabled','success'); load();
    }).catch(e=>window.ADMIN_AUTH.toast(e.message,e.message,'error'));
  }
  function openAddForm(){
    const isOperator = window.ADMIN_AUTH.isOperator();
    const roleOpts = isOperator
      ? [{value:'driver',label:'Driver',label_ar:'سائق'}]
      : [{value:'driver',label:'Driver',label_ar:'سائق'},
         {value:'dispatcher',label:'Operator (dispatcher)',label_ar:'مشغّل'},
         {value:'viewer',label:'Viewer',label_ar:'مشاهد'},
         {value:'admin',label:'Admin',label_ar:'مدير'}];
    // Offer linking the new driver to a driverless vehicle in one go.
    window.ADMIN_AUTH.fetch('/api/admin/vehicles')
      .then(r=>r.ok?r.json():[])
      .then(arr=>(Array.isArray(arr)?arr:[]).filter(v=>!v.assigned_driver_id&&v.status!=='decommissioned'))
      .catch(()=>[])
      .then(function(unassigned){
        const vehicleOpts = [{value:'',label:'— none —',label_ar:'— لا شيء —'}].concat(
          unassigned.map(v=>({value:v.id,label:(v.vehicle_id||v.name||v.id),label_ar:(v.vehicle_id||v.name_ar||v.name||v.id)})));
        window.ADMIN_AUTH.openForm({
          title: isAr()?'إضافة مستخدم جديد':'Add new user',
          subtitle: isOperator
            ? (isAr()?'بصفتك مشغّلاً، تنشئ حسابات السائقين فقط: البريد هو اسم المستخدم، وكلمة المرور تسلّمها للسائق ويُجبر على تغييرها عند أول دخول.':'As an operator you create driver accounts only; the driver must rotate the password on first login.')
            : (isAr()?'البريد هو اسم المستخدم. كلمة المرور تُسلَّم للمستخدم ويُجبر على تغييرها عند أول دخول.':'Email is the username. The user must rotate the password on first login.'),
          fields: [
            { name:'email', label:'Email (username)', label_ar:'البريد الإلكتروني (اسم المستخدم)', type:'email', required:true, placeholder:'driver104@operator.sy' },
            { name:'full_name', label:'Name (English)', label_ar:'الاسم (إنجليزي)', required:true },
            { name:'full_name_ar', label:'Name (Arabic)', label_ar:'الاسم (عربي)' },
            { name:'role', label:'Role', label_ar:'الصلاحية', type:'select', required:true, value:'driver', options: roleOpts },
            { name:'phone', label:'Phone', label_ar:'الهاتف', placeholder:'+9639...' },
            { name:'assigned_vehicle_id', label:'Link to vehicle (drivers only)', label_ar:'ربط بمركبة (للسائقين فقط)', type:'select', options: vehicleOpts,
              hint: unassigned.length ? (isAr()?'تظهر فقط المركبات بدون سائق.':'Only driverless vehicles appear.')
                                      : (isAr()?'لا مركبات متاحة — أنشئ مركبة أولاً.':'No unassigned vehicles — create one first.') },
            { name:'password', label:'Initial password (≥8 chars)', label_ar:'كلمة المرور الأولى (≥8)', type:'password', required:true,
              hint: isAr()?'سيُجبر المستخدم على تغييرها عند أول تسجيل دخول.':'User is forced to rotate it on first login.' },
          ],
          onSubmit: async function(values){
            const vehicleId = values.assigned_vehicle_id; delete values.assigned_vehicle_id;
            const r = await window.ADMIN_AUTH.fetch('/api/admin/users', {
              method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(values)
            });
            if (!r.ok){ const j = await r.json().catch(()=>({detail:'Save failed'})); return {error:j.detail||'Save failed'}; }
            const created = await r.json().catch(()=>({}));
            window.ADMIN_AUTH.toast('تم إنشاء الحساب','Account created','success');
            if (!vehicleId || values.role!=='driver' || !created.id) return;
            const pr = await window.ADMIN_AUTH.fetch('/api/admin/vehicles/'+encodeURIComponent(vehicleId)+'/assign', {
              method:'POST', headers:{'Content-Type':'application/json'},
              body: JSON.stringify({ driver_id: created.id })
            });
            if (!pr.ok){ const j = await pr.json().catch(()=>({}));
              window.ADMIN_AUTH.toast('أُنشئ الحساب لكن فشل ربط المركبة: '+(j.detail||''),'User created but vehicle link failed: '+(j.detail||''),'error'); }
            else window.ADMIN_AUTH.toast('تم ربط السائق بالمركبة — بانتظار اعتماد الإدارة','Driver linked — awaiting admin approval','success');
          },
          onAfter: load,
        });
      });
  }
  function load(){
    if (!window.ADMIN_AUTH) return;
    window.ADMIN_AUTH.fetch('/api/admin/users')
      .then(r=>r.ok?r.json():Promise.reject(new Error('HTTP '+r.status)))
      .then(rows=>{ LAST = Array.isArray(rows)?rows:[]; render(LAST); })
      .catch(e=>{
        if (String(e.message)!=='unauthorized')
          document.getElementById('rows').innerHTML='<tr><td colspan="6"><div class="empty-state">'+esc(e.message||'Error')+'</div></td></tr>';
      });
  }
  document.addEventListener('DOMContentLoaded', function(){
    load();
    const btn = document.getElementById('btn-add');
    // Admins create any role; operators (dispatchers) create drivers only.
    if (btn) btn.addEventListener('click', openAddForm);
  });
  document.addEventListener('i18n:change', ()=>render(LAST));
})();
</script>
</body>
</html>

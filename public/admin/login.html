<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0E5650">
<title>دخول الإدارة — نقل دمشق</title>

<link rel="icon" href="/favicon.svg" type="image/svg+xml">

<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@200;300;400;500;600;700&family=Source+Serif+4:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/lib/design-system.css">

<style>
  body {
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    background: var(--national-green-900);
    color: #fff;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: ""; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80' viewBox='0 0 80 80'><g fill='none' stroke='%23C9A95B' stroke-width='1' stroke-opacity='0.16' stroke-linejoin='round' stroke-linecap='round'><polygon points='68,40 51,45 60,60 45,51 40,68 35,51 20,60 29,45 12,40 29,35 20,20 35,29 40,12 45,29 60,20 51,35'/><path d='M68,40 L80,36.5 M68,40 L80,43.5 M40,68 L36.5,80 M40,68 L43.5,80 M12,40 L0,36.5 M12,40 L0,43.5 M40,12 L36.5,0 M40,12 L43.5,0 M60,20 L72,0 M60,20 L80,8 M60,60 L80,72 M60,60 L72,80 M20,60 L8,80 M20,60 L0,72 M20,20 L0,8 M20,20 L8,0'/><polyline points='8,0 8,3.3 3.3,8 0,8'/><polyline points='80,8 76.7,8 72,3.3 72,0'/><polyline points='72,80 72,76.7 76.7,72 80,72'/><polyline points='8,80 8,76.7 3.3,72 0,72'/></g></svg>");
    background-size: 80px 80px; pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: ""; position: fixed; inset: 0;
    background: radial-gradient(ellipse at 80% 20%, rgba(201,169,91,.18), transparent 55%);
    pointer-events: none;
    z-index: 0;
  }
  body > * { position: relative; z-index: 1; }

  .login-mast {
    display: flex; align-items: center; gap: 14px;
    padding: 24px 24px 0;
    color: #fff;
  }
  .login-mast__mark {
    width: 48px; height: 48px;
    border-radius: 8px; background: #fff; padding: 6px;
    display: grid; place-items: center;
    box-shadow: 0 4px 12px rgba(0,0,0,.20);
  }
  .login-mast__mark img { width: 100%; height: 100%; object-fit: contain; }
  .login-mast__text b { font-family: var(--font-sans); font-size: 16px; font-weight: 700; display: block; }
  .login-mast__text small { color: var(--national-gold); font-size: 11px; letter-spacing: .08em; text-transform: uppercase; font-weight: 600; }

  .login-wrap { display: grid; place-items: center; padding: 24px; }
  .login-shell { width: 100%; max-width: 440px; }

  .login-card {
    background: var(--color-surface);
    border-radius: var(--r-md);
    padding: 32px;
    box-shadow: 0 30px 80px rgba(0,0,0,.40);
    color: var(--color-text);
    border-top: 4px solid var(--national-gold);
  }
  .login-card h1 {
    font-family: var(--font-sans);
    font-size: 24px; font-weight: 700;
    margin: 0 0 6px;
    color: var(--color-text);
  }
  [dir="rtl"] .login-card h1 { font-family: var(--font-sans); }
  .login-card .sub { color: var(--color-text-mute); font-size: 14px; margin: 0 0 22px; }

  .role-pills { display: flex; gap: 8px; margin-bottom: 22px; }
  .role-pill {
    flex: 1; padding: 10px;
    border: 1px solid var(--color-border);
    border-radius: var(--r-sm);
    text-align: center;
    font-size: 13px; font-weight: 600;
    color: var(--color-text-soft);
    cursor: pointer; background: var(--color-surface);
    transition: all var(--t-fast) var(--ease);
    font-family: var(--font-sans);
  }
  .role-pill:hover { border-color: var(--national-green-300); color: var(--national-green); }
  .role-pill.is-active {
    background: var(--national-green-100);
    color: var(--national-green-700);
    border-color: var(--national-green);
    font-weight: 700;
  }

  .password-toggle {
    position: absolute;
    inset-inline-end: 12px; top: 50%; transform: translateY(-50%);
    color: var(--color-text-mute);
    padding: 4px; background: none; border: 0; cursor: pointer;
    transition: color var(--t-fast) var(--ease);
  }
  .password-toggle:hover { color: var(--national-green); }
  .field-pw { position: relative; }
  .field-pw input { padding-inline-end: 40px; }

  .submit-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 12px; flex-wrap: wrap; gap: 8px;
  }
  .submit-row a { font-size: 13px; color: var(--national-green); font-weight: 600; }
  .submit-row a:hover { text-decoration: none; color: var(--national-gold-700); }

  .login-meta {
    color: var(--color-text-mute);
    font-size: 13px;
    margin-top: 18px; text-align: center;
  }
  .login-meta a { color: var(--national-green); font-weight: 600; }

  .legal-bar {
    text-align: center;
    padding: 18px 24px;
    color: rgba(255,255,255,.55);
    font-size: 12px;
  }
  .legal-bar a { color: rgba(255,255,255,.78); }
  .legal-bar a:hover { color: var(--national-gold); text-decoration: none; }

  /* Floating "Back to home" button — always visible top-start corner */
  .back-home {
    position: fixed;
    top: calc(env(safe-area-inset-top) + 16px);
    inset-inline-start: 18px;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 16px;
    background: rgba(255,255,255,.10);
    color: #fff;
    border: 1px solid rgba(255,255,255,.30);
    border-radius: var(--r-pill);
    font-size: 13px; font-weight: 600;
    font-family: var(--font-sans);
    text-decoration: none;
    z-index: 60;
    backdrop-filter: blur(8px);
    transition: background var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease), transform var(--t-fast) var(--ease);
  }
  .back-home:hover {
    background: var(--national-gold);
    color: var(--national-green-950);
    border-color: var(--national-gold);
    text-decoration: none;
    transform: translateY(-1px);
  }
  .back-home svg { width: 14px; height: 14px; }
  [dir="rtl"] .back-home svg { transform: scaleX(-1); }
</style>
</head>
<body class="with-fade-in">

<a href="/" class="back-home" aria-label="العودة إلى الرئيسية">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
  العودة للرئيسية
</a>

<header class="login-mast">
  <span class="login-mast__mark" aria-hidden="true">
    <picture>
      <source srcset="/assets/identity/sy-emblem-eagle.avif" type="image/avif">
      <img src="/assets/identity/sy-emblem-eagle.png" alt="">
    </picture>
  </span>
  <div class="login-mast__text">
    <b>نقل دمشق</b>
    <small>لوحة الإدارة · v4.0</small>
  </div>
</header>

<main class="login-wrap" role="main">
  <div class="login-shell">
    <section class="login-card">
      <h1>تسجيل الدخول</h1>
      <p class="sub">للوصول للوحة الإدارة، الموزّعين، والسائقين.</p>

      <div class="role-pills" role="tablist" aria-label="نوع الدخول">
        <button type="button" class="role-pill is-active" data-role="admin">إدارة</button>
        <button type="button" class="role-pill" data-role="dispatcher">موزّع</button>
        <button type="button" class="role-pill" data-role="driver">سائق</button>
      </div>

      <form id="login-form" autocomplete="on" novalidate>
        <div class="field" style="margin-bottom:14px">
          <label class="field__label" for="email">البريد الإلكتروني</label>
          <input class="input" id="email" name="email" type="email" inputmode="email"
                 autocomplete="username" required>
        </div>

        <div class="field" style="margin-bottom:14px">
          <label class="field__label" for="password">كلمة المرور</label>
          <div class="field-pw">
            <input class="input" id="password" name="password" type="password"
                   autocomplete="current-password" required minlength="6">
            <button type="button" class="password-toggle" id="toggle-pw" aria-label="إظهار/إخفاء كلمة المرور">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <p id="error-msg" class="field__error hidden" role="alert">بيانات الدخول غير صحيحة</p>

        <div id="turnstile-slot" class="hidden" style="margin:10px 0"></div>

        <button type="submit" class="btn btn--lg btn--block btn--primary" id="submit-btn">
          <span id="btn-label">دخول</span>
        </button>

        <div class="submit-row">
          <label class="check"><input type="checkbox" id="remember"> تذكّرني لمدة ٣٠ يوماً</label>
          <a href="/admin/reset.html">نسيت كلمة المرور؟</a>
        </div>
      </form>

      <p class="login-meta">
        تواجه مشكلة في الدخول؟ <a href="mailto:ops@damascustransit.sy">راسل المسؤول</a>
      </p>
    </section>
  </div>
</main>

<footer class="legal-bar">
  © ٢٠٢٦ نقل دمشق ·
  <a href="/">العودة للرئيسية</a> ·
  <a href="/help/">كيفية الاستخدام</a> ·
  <a href="/privacy.html">الخصوصية</a>
</footer>

<script>
'use strict';
const $ = (s, r=document) => r.querySelector(s);
const API_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1') ? 'http://localhost:8000' : '';

let turnstileToken = null;
const TURNSTILE_KEY = window.TURNSTILE_SITE_KEY || '';
if (TURNSTILE_KEY) {
  const slot = $('#turnstile-slot');
  slot.classList.remove('hidden');
  const s = document.createElement('script');
  s.src = 'https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTurnstileReady&render=explicit';
  s.async = true; s.defer = true;
  document.head.appendChild(s);
  window.onTurnstileReady = () => {
    window.turnstile.render(slot, {
      sitekey: TURNSTILE_KEY, theme: 'light',
      callback: (token) => { turnstileToken = token; },
      'error-callback': () => { turnstileToken = null; },
      'expired-callback': () => { turnstileToken = null; },
    });
  };
}

let selectedRole = 'admin';
document.querySelectorAll('.role-pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.role-pill').forEach(o => o.classList.remove('is-active'));
    p.classList.add('is-active');
    selectedRole = p.dataset.role;
  });
});

$('#toggle-pw').addEventListener('click', () => {
  const pw = $('#password');
  pw.type = pw.type === 'password' ? 'text' : 'password';
});

$('#login-form').addEventListener('submit', async (ev) => {
  ev.preventDefault();
  const email = $('#email').value.trim();
  const password = $('#password').value;
  const remember = $('#remember').checked;
  $('#error-msg').classList.add('hidden');
  const btn = $('#submit-btn');
  btn.disabled = true;
  btn.classList.add('is-loading');
  try {
    if (TURNSTILE_KEY && !turnstileToken) {
      $('#error-msg').textContent = 'يرجى إكمال التحقق من خانة الإنسان';
      $('#error-msg').classList.remove('hidden');
      btn.disabled = false;
      btn.classList.remove('is-loading');
      return;
    }
    const r = await fetch(API_BASE + '/api/auth/login', {
      method: 'POST',
      headers: {
        'Content-Type':'application/json',
        ...(turnstileToken ? { 'X-Turnstile-Token': turnstileToken } : {}),
      },
      body: JSON.stringify({ email, password, remember, turnstile_token: turnstileToken }),
    });
    if (!r.ok) throw new Error('login failed');
    const data = await r.json();
    const token = data.token || data.access_token;
    const user = data.user || data;
    const storage = remember ? localStorage : sessionStorage;
    storage.setItem('dt_token', token);
    storage.setItem('dt_user', JSON.stringify(user));
    const role = (user && user.role) || selectedRole;
    if (role === 'driver') location.href = '/driver/';
    else location.href = '/admin/';
  } catch (e) {
    $('#error-msg').classList.remove('hidden');
  } finally {
    btn.disabled = false;
    btn.classList.remove('is-loading');
  }
});
</script>
<script src="/lib/i18n.js" defer></script>
</body>
</html>

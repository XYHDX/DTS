<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0E5650">
<title>الحافلات — لوحة الإدارة — نقل دمشق</title>

<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@200;300;400;500;600;700&family=Source+Serif+4:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/lib/design-system.css">
<link rel="stylesheet" href="/admin/_layout.css">
<script src="/admin/_gate.js"></script>
</head>
<body data-page="vehicles">
<noscript><div style="margin:0;padding:14px 18px;background:#9b121e;color:#fff;font-family:system-ui,sans-serif;font-size:14px;text-align:center;">يتطلب هذا التطبيق تفعيل جافاسكربت للعمل. · This app requires JavaScript to be enabled.</div></noscript>

<!-- Universal utility bar -->
<div class="utility-bar">
  <div class="container">
    <span class="gov" data-i18n="hero.eyebrow">الجمهورية العربية السورية</span>
    <span class="right">
      <a href="/" data-i18n="header.home">الرئيسية</a>
      <span class="sep"></span>
      <a href="/passenger/" data-i18n="header.passenger">للركاب</a>
      <span class="sep"></span>
      <a href="/driver/" data-i18n="header.driver">للسائقين</a>
      <span class="sep"></span>
      <a href="/admin/login.html" data-i18n="header.admin">الإدارة</a>
      <span class="sep"></span>
      <button class="utility-lang" id="lang-toggle" data-i18n-toggle data-i18n="header.toggleLang" aria-label="Toggle language">EN</button>
    </span>
  </div>
</div>

<div class="admin-shell">

  <aside class="sidebar" aria-label="القائمة الجانبية">
    <a href="/" class="sidebar__brand">
      <span class="sidebar__brand-mark" aria-hidden="true">
        <picture>
          <source srcset="/assets/identity/sy-emblem-eagle.avif" type="image/avif">
          <img src="/assets/identity/sy-emblem-eagle.png" alt="">
        </picture>
      </span>
      <span class="sidebar__brand-text">
        <b data-i18n="admin.brand">نقل دمشق</b>
        <small data-i18n="admin.brandSub">لوحة الإدارة</small>
      </span>
    </a>

    <nav data-shell-nav aria-label="إدارة"></nav>

    <div class="sidebar__footer">
      <div class="sidebar__user">
        <div class="avatar-circle" id="user-initial">؟</div>
        <div>
          <div class="name" id="user-name">—</div>
          <div class="role" id="user-role">—</div>
        </div>
      </div>
      <button class="sidebar__logout" id="logout-btn" data-i18n="admin.logout">تسجيل الخروج</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="pagetitle">
        <h1 data-i18n="admin.vehicles.title">الحافلات</h1>
        <p data-i18n="admin.vehicles.sub">قائمة الأسطول كاملاً مع الخط المعيّن والسعة والحالة.</p>
      </div>
      <div class="cluster">
        <button id="btn-add-vehicle" class="btn btn--primary" type="button" data-i18n="admin.vehicles.add" style="padding:8px 14px;background:#0E5650;color:#fff;border:0;border-radius:8px;cursor:pointer;">+ إضافة مركبة</button>
        <span class="badge badge--success"><span class="live-dot" aria-hidden="true"></span><span data-i18n="admin.live"> مباشر</span></span>
      </div>
    </div>

    <section class="data-table-card">
      <table class="data-table" aria-label="vehicles">
        <thead>
          <tr>
            <th data-i18n="admin.vehicles.code">رمز الحافلة</th>
            <th data-i18n="admin.vehicles.name">الاسم</th>
            <th data-i18n="admin.vehicles.type">النوع</th>
            <th data-i18n="admin.col.driver">السائق</th>
            <th data-i18n="admin.vehicles.route">الخط المعيّن</th>
            <th data-i18n="admin.vehicles.capacity">السعة</th>
            <th data-i18n="admin.vehicles.status">الحالة</th>
            <th data-i18n="admin.col.approval">الاعتماد</th>
            <th>—</th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="9"><div class="skeleton" style="width:100%;height:1.2em"></div></td></tr>
          <tr><td colspan="9"><div class="skeleton" style="width:100%;height:1.2em"></div></td></tr>
          <tr><td colspan="9"><div class="skeleton" style="width:100%;height:1.2em"></div></td></tr>
        </tbody>
      </table>
    </section>
  </main>

</div>

<script src="/lib/i18n.js"></script>
<script src="/admin/_shell.js" defer></script>
<script>
(function () {
  'use strict';
  let LAST = [], ROUTES = [], DRIVERS = [], PAGER = null;
  const TYPE_AR = { bus:'حافلة', microbus:'ميكروباص', taxi:'تكسي' };
  function isAr(){ return (document.documentElement.lang||'ar').slice(0,2)==='ar'; }
  function esc(s){ return window.ADMIN_AUTH.esc(s); }
  const APPROVAL = {
    pending:  ['قيد الانتظار','Pending','is-warn'],
    approved: ['معتمدة','Approved','is-active'],
    rejected: ['مرفوضة','Rejected','is-danger'],
    suspended:['معلّقة','Suspended','is-offline'],
  };
  function statusClass(s){ return s==='active'?'is-active':(s==='maintenance'?'is-warn':'is-offline'); }
  function statusLabel(s){
    const m = isAr()? {active:'نشطة',idle:'متوقفة',maintenance:'صيانة',decommissioned:'خارج الخدمة'}
                    : {active:'Active',idle:'Idle',maintenance:'Maintenance',decommissioned:'Decommissioned'};
    return m[s]||s||'—';
  }
  function routeLabel(id){
    const r = ROUTES.find(x=>x.id===id);
    if (!r) return '<span class="cell-muted">—</span>';
    return '<span class="cell-mono">'+esc(r.route_id||r.code||'')+'</span> <span class="cell-muted">'+esc(isAr()?(r.name_ar||r.name||''):(r.name||r.name_ar||''))+'</span>';
  }
  function render(rows){
    const tbody = document.getElementById('rows');
    if (!rows.length){
      tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state">'+(isAr()?'لا توجد مركبات مسجّلة بعد. ابدأ بإضافة مركبة.':'No vehicles registered yet.')+'</div></td></tr>';
      return;
    }
    const canDecide = window.ADMIN_AUTH.isAdmin();
    tbody.innerHTML = rows.map(function(v){
      const ap = APPROVAL[v.approval_status||'approved'] || APPROVAL.approved;
      const name = isAr()?(v.name_ar||v.name||'—'):(v.name||v.name_ar||'—');
      const driver = v.driver_name ? esc(v.driver_name) : '<span class="cell-muted">—</span>';
      let actions = '<button class="btn-row js-edit" data-id="'+esc(v.id)+'" style="color:var(--national-green)">'+(isAr()?'تعديل':'Edit')+'</button>';
      actions += ' <button class="btn-row js-assign" data-id="'+esc(v.id)+'" style="color:var(--national-green)">'+(isAr()?'تعيين':'Assign')+'</button>';
      if (canDecide) actions += ' <button class="btn-row js-del" data-id="'+esc(v.id)+'" style="color:#b91c1c">'+(isAr()?'إخراج':'Retire')+'</button>';
      return '<tr>'+
        '<td class="cell-mono">'+esc(v.vehicle_id||'—')+'</td>'+
        '<td>'+esc(name)+'</td>'+
        '<td class="cell-muted">'+esc(isAr()?(TYPE_AR[v.vehicle_type]||v.vehicle_type):(v.vehicle_type||'bus'))+'</td>'+
        '<td>'+driver+'</td>'+
        '<td>'+routeLabel(v.assigned_route_id)+'</td>'+
        '<td>'+(v.capacity!=null?esc(v.capacity):'—')+'</td>'+
        '<td><span class="status-pill '+statusClass(v.status)+'">'+esc(statusLabel(v.status))+'</span></td>'+
        '<td><span class="status-pill '+ap[2]+'">'+esc(isAr()?ap[0]:ap[1])+'</span></td>'+
        '<td style="white-space:nowrap">'+actions+'</td>'+
      '</tr>';
    }).join('');
    tbody.querySelectorAll('.js-del').forEach(b=>b.addEventListener('click', onRetire));
    tbody.querySelectorAll('.js-assign').forEach(b=>b.addEventListener('click', onAssign));
    tbody.querySelectorAll('.js-edit').forEach(b=>b.addEventListener('click', onEdit));
  }
  function onEdit(ev){
    const id = ev.currentTarget.dataset.id;
    const v = LAST.find(x=>x.id===id) || {};
    window.ADMIN_AUTH.openForm({
      title: isAr()?'تعديل المركبة':'Edit vehicle',
      subtitle: isAr()?'الاسم والسعة والحالة وجهاز التتبّع — دون الحاجة لقاعدة البيانات.':'Name, capacity, status and GPS tracker — no database needed.',
      fields: [
        { name:'name', label:'Name (English)', label_ar:'الاسم (إنجليزي)', value:v.name||'' },
        { name:'name_ar', label:'Name (Arabic)', label_ar:'الاسم (عربي)', value:v.name_ar||'' },
        { name:'capacity', label:'Capacity', label_ar:'السعة', type:'number', min:1, max:200, value:(v.capacity!=null?v.capacity:'') },
        { name:'status', label:'Status', label_ar:'الحالة', type:'select', value:v.status||'idle',
          options:[{value:'active',label:'Active',label_ar:'نشطة'},{value:'idle',label:'Idle',label_ar:'متوقفة'},{value:'maintenance',label:'Maintenance',label_ar:'صيانة'}]},
        { name:'gps_device_id', label:'GPS device ID', label_ar:'معرّف جهاز التتبّع', value:v.gps_device_id||'', placeholder:'DTS003',
          hint: isAr()?'اتركه فارغاً لإلغاء اقتران الجهاز.':'Leave empty to unpair the tracker.' },
        { name:'is_real_gps', label:'Tracking source', label_ar:'مصدر التتبّع', type:'select', value:(v.is_real_gps?'true':'false'),
          options:[{value:'true',label:'Real GPS tracker',label_ar:'جهاز تتبّع حقيقي'},{value:'false',label:'Phone / simulated',label_ar:'هاتف / محاكاة'}]},
      ],
      onSubmit: async function(values){
        const payload = {};
        if (values.name && values.name.trim()) payload.name = values.name.trim();
        if (values.name_ar && values.name_ar.trim()) payload.name_ar = values.name_ar.trim();
        if (values.capacity!=null && values.capacity!=='') payload.capacity = Number(values.capacity);
        if (values.status) payload.status = values.status;
        payload.gps_device_id = (values.gps_device_id||'').trim();  // empty = unpair
        payload.is_real_gps = (values.is_real_gps === 'true');
        const r = await window.ADMIN_AUTH.fetch('/api/admin/vehicles/'+encodeURIComponent(id), {
          method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)
        });
        if (!r.ok){ const j = await r.json().catch(()=>({detail:'Save failed'})); return {error: j.detail||'Save failed'}; }
        window.ADMIN_AUTH.toast('تم تحديث المركبة','Vehicle updated','success');
      },
      onAfter: load,
    });
  }
  function onRetire(ev){
    const id = ev.currentTarget.dataset.id;
    if (!confirm(isAr()?'إخراج المركبة من الخدمة نهائياً؟ (يُحفظ سجلّها)':'Retire this vehicle? (history is kept)')) return;
    window.ADMIN_AUTH.fetch('/api/admin/vehicles/'+encodeURIComponent(id), {method:'DELETE'})
      .then(r=>{ if(!r.ok) return r.json().then(j=>{throw new Error(j.detail||'Failed');}); window.ADMIN_AUTH.toast('تم إخراج المركبة من الخدمة','Vehicle retired','success'); load(); })
      .catch(e=>window.ADMIN_AUTH.toast(e.message,e.message,'error'));
  }
  function onAssign(ev){
    const id = ev.currentTarget.dataset.id;
    const v = LAST.find(x=>x.id===id) || {};
    const routeOpts = [{value:'',label:'—',label_ar:'—'}].concat(ROUTES.map(r=>({value:r.id,label:(r.route_id||'')+' — '+(r.name||''),label_ar:(r.route_id||'')+' — '+(r.name_ar||r.name||'')})));
    const driverOpts = [{value:'',label:'—',label_ar:'—'}].concat(DRIVERS.map(d=>({value:d.id,label:(d.full_name||d.email||''),label_ar:(d.full_name_ar||d.full_name||d.email||'')})));
    window.ADMIN_AUTH.openForm({
      title: isAr()?'تعيين سائق وخط':'Assign driver & route',
      subtitle: isAr()?'يعيّن المشغّل السائق (باسم المستخدم الذي أنشأه) ثم تعتمد الإدارة المركبة من صفحة الموافقات.':'Operator links the driver they created; the admin then approves on the Approvals page.',
      fields: [
        { name:'driver_id', label:'Driver', label_ar:'السائق', type:'select', options:driverOpts, value:v.assigned_driver_id||'' },
        { name:'route_id',  label:'Route',  label_ar:'الخط',   type:'select', options:routeOpts,  value:v.assigned_route_id||'' },
      ],
      onSubmit: async function(values){
        const r = await window.ADMIN_AUTH.fetch('/api/admin/vehicles/'+encodeURIComponent(id)+'/assign', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ driver_id: values.driver_id, route_id: values.route_id })
        });
        if (!r.ok){ const j = await r.json().catch(()=>({detail:'Failed'})); return {error: j.detail||'Failed'}; }
        window.ADMIN_AUTH.toast('تم حفظ التعيين','Assignment saved','success');
      },
      onAfter: load,
    });
  }
  function openAddForm(){
    window.ADMIN_AUTH.openForm({
      title: isAr()?'تسجيل مركبة جديدة':'Register new vehicle',
      subtitle: isAr()?'حافلة / ميكروباص / تكسي. تبدأ المركبة "قيد الانتظار" حتى تعتمدها الإدارة (إلا إذا أنشأها مدير).':'Bus / microbus / taxi. Starts as “pending” until an admin approves it.',
      fields: [
        { name:'vehicle_id', label:'Plate / fleet code', label_ar:'رقم اللوحة / الرمز', required:true, placeholder:'B-104' },
        { name:'name',       label:'Name (English)', label_ar:'الاسم (إنجليزي)', required:true, placeholder:'Bus 104' },
        { name:'name_ar',    label:'Name (Arabic)',  label_ar:'الاسم (عربي)', required:true, placeholder:'الحافلة ١٠٤' },
        { name:'vehicle_type', label:'Type', label_ar:'النوع', type:'select', required:true, value:'bus',
          options:[{value:'bus',label:'Bus',label_ar:'حافلة'},{value:'microbus',label:'Microbus',label_ar:'ميكروباص'},{value:'taxi',label:'Taxi',label_ar:'تكسي'}]},
        { name:'capacity',   label:'Capacity', label_ar:'السعة', type:'number', required:true, min:1, max:200, value:40 },
        { name:'gps_device_id', label:'GPS device ID (your hardware)', label_ar:'معرّف جهاز GPS (عتادك الخاص)', placeholder:'DTS-GPS-0042',
          hint: isAr()?'المعرّف المطبوع على وحدة التتبع المركّبة في المركبة.':'The ID printed on the tracking unit installed in the vehicle.' },
      ],
      onSubmit: async function(values){
        values.is_real_gps = !!values.gps_device_id;
        if (!values.gps_device_id) delete values.gps_device_id;
        const r = await window.ADMIN_AUTH.fetch('/api/admin/vehicles', {
          method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(values)
        });
        if (!r.ok){ const j = await r.json().catch(()=>({detail:'Save failed'})); return {error:j.detail||'Save failed'}; }
        const created = await r.json().catch(()=>({}));
        if (created.approval_status === 'pending')
          window.ADMIN_AUTH.toast('سُجّلت المركبة وأُرسلت للموافقة','Vehicle registered — sent for approval','success');
        else
          window.ADMIN_AUTH.toast('سُجّلت المركبة واعتُمدت','Vehicle registered & approved','success');
      },
      onAfter: load,
    });
  }
  function load(){
    if (!window.ADMIN_AUTH) return;
    Promise.all([
      window.ADMIN_AUTH.fetch('/api/admin/vehicles').then(r=>r.ok?r.json():[]),
      window.ADMIN_AUTH.fetch('/api/admin/routes').then(r=>r.ok?r.json():fetch('/api/routes').then(rr=>rr.ok?rr.json():[])),
      window.ADMIN_AUTH.fetch('/api/admin/users').then(r=>r.ok?r.json():[]),
    ]).then(function(parts){
      LAST = Array.isArray(parts[0])?parts[0]:[];
      ROUTES = Array.isArray(parts[1])?parts[1]:[];
      DRIVERS = (Array.isArray(parts[2])?parts[2]:[]).filter(u=>u.role==='driver'&&u.is_active!==false);
      if (PAGER) PAGER.set(LAST); else render(LAST);
    }).catch(function(e){
      if (String(e.message)!=='unauthorized')
        document.getElementById('rows').innerHTML='<tr><td colspan="9"><div class="empty-state">'+esc(e.message||'Error')+'</div></td></tr>';
    });
  }
  document.addEventListener('DOMContentLoaded', function(){
    PAGER = window.ADMIN_AUTH.pager({ render: render, pageSize: 15, mountAfter: '.data-table-card' });
    load();
    const btn = document.getElementById('btn-add-vehicle');
    if (btn) btn.addEventListener('click', openAddForm); // admins AND operators may register vehicles
  });
  document.addEventListener('i18n:change', ()=>{ if (PAGER) PAGER.redraw(); else render(LAST); });
})();
</script>
</body>
</html>

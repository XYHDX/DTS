<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0E5650">
<title>نقل دمشق — للسائقين</title>

<link rel="manifest" href="/driver/manifest.json">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@200;300;400;500;600;700&family=Source+Serif+4:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/lib/design-system.css">

<style>
  body { background: var(--color-bg); padding-bottom: 0; }
  .driver-shell { min-height: 100vh; display: flex; flex-direction: column; }

  /* Driver bar — dark teal-green with subtle pattern overlay */
  .driver-bar {
    background: var(--national-green-900);
    color: #fff;
    padding: calc(env(safe-area-inset-top) + 14px) 16px 14px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: center;
    position: relative;
    overflow: hidden;
    border-bottom: 1px solid var(--national-gold);
  }
  .driver-bar::before {
    content: ""; position: absolute; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80' viewBox='0 0 80 80'><g fill='none' stroke='%23C9A95B' stroke-width='1' stroke-opacity='0.22' stroke-linejoin='round' stroke-linecap='round'><polygon points='68,40 51,45 60,60 45,51 40,68 35,51 20,60 29,45 12,40 29,35 20,20 35,29 40,12 45,29 60,20 51,35'/><path d='M68,40 L80,36.5 M68,40 L80,43.5 M40,68 L36.5,80 M40,68 L43.5,80 M12,40 L0,36.5 M12,40 L0,43.5 M40,12 L36.5,0 M40,12 L43.5,0 M60,20 L72,0 M60,20 L80,8 M60,60 L80,72 M60,60 L72,80 M20,60 L8,80 M20,60 L0,72 M20,20 L0,8 M20,20 L8,0'/><polyline points='8,0 8,3.3 3.3,8 0,8'/><polyline points='80,8 76.7,8 72,3.3 72,0'/><polyline points='72,80 72,76.7 76.7,72 80,72'/><polyline points='8,80 8,76.7 3.3,72 0,72'/></g></svg>");
    background-size: 80px 80px;
    pointer-events: none;
  }
  .driver-bar > * { position: relative; z-index: 1; }
  .driver-bar .label { color: rgba(255,255,255,.7); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; font-weight: 600; }
  .driver-bar .vehicle-id { font-weight: 800; font-size: 22px; font-family: var(--font-mono); color: var(--national-gold); line-height: 1.1; }
  .gps-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,.10); color: #fff;
    padding: 6px 12px; border-radius: var(--r-pill);
    font-size: 12px; font-weight: 600;
    border: 1px solid rgba(255,255,255,.18);
  }
  .gps-pill .live-dot { background: var(--national-gold); }
  .gps-pill.is-off .live-dot { background: var(--national-red); animation: none; }
  .logout-btn {
    background: rgba(255,255,255,.10); color: #fff;
    border: 1px solid rgba(255,255,255,.22);
    width: 40px; height: 40px; border-radius: 50%;
    display: grid; place-items: center;
    cursor: pointer;
    transition: background var(--t-fast) var(--ease);
  }
  .logout-btn:hover { background: rgba(255,255,255,.18); }

  .login-pane, .trip-pane { flex: 1; padding: 24px 16px 32px; }
  .login-pane { display: grid; place-content: center; max-width: 440px; margin: 0 auto; width: 100%; }
  .login-card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    padding: 28px;
    border-radius: var(--r-md);
    box-shadow: var(--sh-md);
    width: 100%;
  }
  .login-card h2 {
    font-family: var(--font-sans);
    font-size: 22px; font-weight: 700;
    margin: 0 0 8px;
  }
  .login-card .sub { color: var(--color-text-mute); font-size: 14px; margin: 0 0 22px; }

  .biometric-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%;
    background: var(--national-green-100);
    color: var(--national-green-700);
    border: 1px solid var(--national-green-300);
    border-radius: var(--r-sm);
    padding: 14px;
    font-weight: 600; font-size: 15px;
    margin-bottom: 14px;
    cursor: pointer;
    transition: background var(--t-fast) var(--ease);
  }
  .biometric-btn:hover { background: var(--national-green-200); }

  /* Trip controls */
  .trip-header {
    background: linear-gradient(180deg, var(--national-green-800), var(--national-green-700));
    color: #fff;
    padding: 20px;
    border-radius: var(--r-md);
    margin-bottom: 18px;
    position: relative; overflow: hidden;
    border: 1px solid var(--national-gold);
  }
  .trip-header::after {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(circle at 85% 15%, rgba(201,169,91,.18), transparent 50%);
    pointer-events: none;
  }
  .trip-header > * { position: relative; z-index: 1; }
  .trip-header .label { color: var(--national-gold); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; font-weight: 700; }
  .trip-header .route-name { font-family: var(--font-sans); font-size: 24px; font-weight: 700; margin: 6px 0; color: #fff; }
  .trip-header .next-stop { color: rgba(255,255,255,.82); font-size: 14px; }

  .big-button {
    display: grid; place-items: center;
    width: 100%; min-height: 76px;
    border-radius: var(--r-md);
    font-size: 22px;
    font-weight: 700;
    box-shadow: var(--sh-md);
    cursor: pointer;
    transition: transform 80ms ease, box-shadow var(--t-fast) var(--ease);
    border: 0;
    font-family: var(--font-sans);
  }
  .big-button--start { background: var(--national-green); color: #fff; }
  .big-button--start:hover { background: var(--national-green-600); }
  .big-button--end   { background: var(--national-red); color: #fff; }
  .big-button--end:hover { background: var(--national-red-700); }
  .big-button:active { transform: translateY(2px); }

  .counter {
    display: grid;
    grid-template-columns: 72px 1fr 72px;
    align-items: center;
    gap: 14px;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--r-md);
    padding: 16px;
    margin-block: 20px;
    box-shadow: var(--sh-sm);
  }
  .counter button {
    width: 72px; height: 72px; border-radius: var(--r-sm);
    background: var(--national-green-100);
    color: var(--national-green-700);
    font-size: 2.2rem; font-weight: 700;
    border: 0; cursor: pointer;
    transition: background var(--t-fast) var(--ease), transform 80ms ease;
  }
  .counter button:hover { background: var(--national-green-200); }
  .counter button:active { transform: scale(.96); }
  .counter__value {
    text-align: center;
    font-size: 3rem; font-weight: 700;
    color: var(--color-text);
    font-variant-numeric: tabular-nums;
    line-height: 1;
    font-family: var(--font-mono);
  }
  .counter__label {
    display: block;
    text-align: center;
    font-size: 12px;
    color: var(--color-text-mute);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .04em;
    margin-top: 6px;
  }

  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .meta-card {
    background: var(--color-surface); border: 1px solid var(--color-border);
    border-radius: var(--r-sm); padding: 12px;
    text-align: center;
    transition: border-color var(--t-fast) var(--ease);
  }
  .meta-card:hover { border-color: var(--national-green-300); }
  .meta-card__label { color: var(--color-text-mute); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
  .meta-card__value { font-size: 22px; font-weight: 700; color: var(--color-text); font-family: var(--font-mono); margin-top: 4px; }
  .meta-card__value .unit { font-size: 12px; font-weight: 500; color: var(--color-text-mute); font-family: var(--font-sans); }

  .incident-btn {
    width: 100%;
    background: rgba(206,17,38,.06);
    color: var(--national-red);
    border: 1.5px dashed var(--national-red);
    border-radius: var(--r-sm);
    padding: 14px;
    font-weight: 600; font-size: 15px;
    margin-top: 18px;
    cursor: pointer;
    transition: background var(--t-fast) var(--ease);
  }
  .incident-btn:hover { background: rgba(206,17,38,.10); }
</style>
</head>
<body class="with-fade-in">

<div class="flag-strip" aria-hidden="true">
  <span class="flag-strip__green"></span>
  <span class="flag-strip__white"></span>
  <span class="flag-strip__black"></span>
</div>

<div class="driver-shell">

<div id="offline-banner" class="offline-banner hidden" role="status" data-i18n="driver.offline">دون اتصال — يتم تخزين المواقع محلياً وستُرسل عند العودة</div>

<header class="driver-bar">
  <div>
    <div class="label">حافلة</div>
    <div class="vehicle-id" id="bar-vehicle">—</div>
  </div>
  <div style="text-align:center">
    <span class="gps-pill" id="gps-pill">
      <span class="live-dot" aria-hidden="true"></span>
      <span id="gps-text">جاري الاتصال…</span>
    </span>
  </div>
  <button id="logout-btn" class="logout-btn" title="تسجيل الخروج" aria-label="تسجيل الخروج">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 17l-5-5 5-5M5 12h14"/></svg>
  </button>
</header>

<!-- Login pane -->
<section id="login-pane" class="login-pane">
  <div class="login-card">
    <h2>دخول السائق</h2>
    <p class="sub">أدخل بريدك وكلمة المرور، أو استخدم البصمة إن كانت مفعّلة.</p>

    <button id="biometric-btn" class="biometric-btn hidden">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9 12a3 3 0 0 1 6 0v4a1 1 0 0 1-2 0v-4"/></svg>
      الدخول ببصمة الإصبع
    </button>

    <form id="login-form" style="display:flex;flex-direction:column;gap:14px">
      <div class="field">
        <label class="field__label" for="email">البريد</label>
        <input class="input" id="email" type="email" inputmode="email" autocomplete="username" required>
      </div>
      <div class="field">
        <label class="field__label" for="password">كلمة المرور</label>
        <input class="input" id="password" type="password" autocomplete="current-password" required>
      </div>
      <button class="btn btn--lg btn--block" type="submit">دخول</button>
      <p class="field__error hidden" id="login-error">بيانات الدخول غير صحيحة</p>
    </form>
  </div>
</section>

<!-- Trip pane -->
<section id="trip-pane" class="trip-pane hidden">

  <div class="trip-header">
    <div class="label">الخط الحالي</div>
    <div class="route-name" id="route-name">—</div>
    <div class="next-stop" id="next-stop">المحطة التالية: —</div>
  </div>

  <button id="start-trip" class="big-button big-button--start">▶ بدء الرحلة</button>
  <button id="end-trip" class="big-button big-button--end hidden">■ إنهاء الرحلة</button>

  <div id="trip-running" class="hidden">
    <div class="counter" role="group" aria-label="عدّاد الركاب">
      <button id="dec" aria-label="إنقاص">−</button>
      <div>
        <div class="counter__value" id="pax-count">٠</div>
        <span class="counter__label">عدد الركاب</span>
      </div>
      <button id="inc" aria-label="زيادة">+</button>
    </div>

    <div class="meta-grid">
      <div class="meta-card">
        <div class="meta-card__label">السرعة</div>
        <div class="meta-card__value" id="meta-speed">٠ <span class="unit">كم/س</span></div>
      </div>
      <div class="meta-card">
        <div class="meta-card__label">المسافة</div>
        <div class="meta-card__value" id="meta-dist">٠ <span class="unit">كم</span></div>
      </div>
      <div class="meta-card">
        <div class="meta-card__label">المدة</div>
        <div class="meta-card__value" id="meta-time">٠ <span class="unit">د</span></div>
      </div>
      <div class="meta-card">
        <div class="meta-card__label">الإشغال</div>
        <div class="meta-card__value" id="meta-occ">٠٪</div>
      </div>
    </div>

    <button id="incident-btn" class="incident-btn">
      🚨 الإبلاغ عن حادث
    </button>
  </div>
</section>

</div>

<script src="/lib/capacitor-bridge.js"></script>
<script src="/lib/i18n.js" defer></script>
<script>
'use strict';
const $ = (s, r=document) => r.querySelector(s);
const API_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1') ? 'http://localhost:8000' : '';
const arDigit = (n) => Number(n).toLocaleString('ar-EG');

let token = sessionStorage.getItem('dt_token') || null;
let user  = JSON.parse(sessionStorage.getItem('dt_user') || 'null');
let tripId = null;
let pax = 0;
let positionWatchStop = null;
let tripStartedAt = null;
let lastPos = null;
let totalKm = 0;
let timerInterval = null;

function showLogin() {
  $('#login-pane').classList.remove('hidden');
  $('#trip-pane').classList.add('hidden');
}
function showTrip() {
  $('#login-pane').classList.add('hidden');
  $('#trip-pane').classList.remove('hidden');
  $('#bar-vehicle').textContent = user?.vehicle_code || user?.vehicle_id || '—';
  $('#route-name').textContent = user?.route_name || 'بانتظار تخصيص الخط';
}

function setOnline(on) {
  $('#offline-banner').classList.toggle('hidden', on);
}
addEventListener('online', () => setOnline(true));
addEventListener('offline', () => setOnline(false));
setOnline(navigator.onLine);

function setGps(connected, text) {
  const pill = $('#gps-pill');
  $('#gps-text').textContent = text || (connected ? 'مرتبط بالقمر' : 'بدون GPS');
  pill.classList.toggle('is-off', !connected);
}

// Login
$('#login-form').addEventListener('submit', async (ev) => {
  ev.preventDefault();
  const email = $('#email').value.trim();
  const password = $('#password').value;
  $('#login-error').classList.add('hidden');
  try {
    const r = await fetch(API_BASE + '/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password}),
    });
    if (!r.ok) throw new Error('login');
    const data = await r.json();
    token = data.token || data.access_token;
    user  = data.user || data;
    sessionStorage.setItem('dt_token', token);
    sessionStorage.setItem('dt_user', JSON.stringify(user));
    showTrip();
    setupGPS();
  } catch (e) {
    $('#login-error').classList.remove('hidden');
  }
});

$('#logout-btn').addEventListener('click', () => {
  sessionStorage.removeItem('dt_token');
  sessionStorage.removeItem('dt_user');
  token = null; user = null;
  if (positionWatchStop) try { positionWatchStop(); } catch(_) {}
  showLogin();
});

// Biometric
const cap = window.CapacitorBridge;
if (cap && cap.IS_NATIVE) {
  cap.getBiometryType().then(t => {
    if (t && t !== 'none') $('#biometric-btn').classList.remove('hidden');
  }).catch(()=>{});
}
$('#biometric-btn').addEventListener('click', async () => {
  if (!cap) return;
  const ok = await cap.authenticateBiometric('دخول السائق');
  if (ok) {
    $('#login-error').textContent = 'يرجى الدخول بالبريد وكلمة المرور أولاً';
    $('#login-error').classList.remove('hidden');
  }
});

// GPS
function setupGPS() {
  if (cap && cap.IS_NATIVE) {
    cap.requestLocationPermission().then(perm => {
      if (perm === 'granted') {
        positionWatchStop = cap.watchPosition(
          (p) => onPosition(p.coords),
          () => setGps(false, 'تعذّر الوصول للموقع')
        );
      }
    });
  } else if (navigator.geolocation) {
    const id = navigator.geolocation.watchPosition(
      (p) => onPosition(p.coords),
      () => setGps(false, 'فعّل GPS من المتصفح'),
      { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
    );
    positionWatchStop = () => navigator.geolocation.clearWatch(id);
  }
}

function onPosition(c) {
  setGps(true);
  const speed = c.speed != null ? Math.max(0, Math.round(c.speed * 3.6)) : 0;
  $('#meta-speed').innerHTML = arDigit(speed) + ' <span class="unit">كم/س</span>';

  if (lastPos) {
    const km = haversineKm(lastPos.latitude, lastPos.longitude, c.latitude, c.longitude);
    if (km < 1) totalKm += km;
    $('#meta-dist').innerHTML = arDigit(totalKm.toFixed(1)) + ' <span class="unit">كم</span>';
  }
  lastPos = c;

  if (tripId && token) {
    fetch(API_BASE + '/api/driver/position', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+token },
      body: JSON.stringify({ lat: c.latitude, lon: c.longitude, speed, heading: c.heading })
    }).catch(()=>{});
  }
}

function haversineKm(lat1,lon1,lat2,lon2){
  const R=6371; const toR=d=>d*Math.PI/180;
  const dLat=toR(lat2-lat1), dLon=toR(lon2-lon1);
  const a=Math.sin(dLat/2)**2 + Math.cos(toR(lat1))*Math.cos(toR(lat2))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}

// Trip controls
$('#start-trip').addEventListener('click', async () => {
  if (!token) return;
  try {
    const r = await fetch(API_BASE + '/api/driver/trip/start', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+token },
      body: '{}'
    });
    if (!r.ok) throw new Error('start');
    const data = await r.json();
    tripId = data.trip_id || data.id || 'local-' + Date.now();
  } catch (_) {
    tripId = 'local-' + Date.now();
  }
  tripStartedAt = Date.now();
  totalKm = 0; pax = 0; lastPos = null;
  $('#pax-count').textContent = arDigit(0);
  $('#start-trip').classList.add('hidden');
  $('#end-trip').classList.remove('hidden');
  $('#trip-running').classList.remove('hidden');
  timerInterval = setInterval(updateTimer, 1000);
  if (cap?.startBackgroundGeolocation) cap.startBackgroundGeolocation((p) => onPosition(p.coords || p));
});

$('#end-trip').addEventListener('click', async () => {
  if (timerInterval) clearInterval(timerInterval);
  try {
    await fetch(API_BASE + '/api/driver/trip/end', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+token },
      body: JSON.stringify({ trip_id: tripId, passengers: pax, distance_km: totalKm })
    });
  } catch (_) {}
  tripId = null; tripStartedAt = null;
  $('#start-trip').classList.remove('hidden');
  $('#end-trip').classList.add('hidden');
  $('#trip-running').classList.add('hidden');
});

function updateTimer() {
  if (!tripStartedAt) return;
  const mins = Math.floor((Date.now() - tripStartedAt) / 60000);
  $('#meta-time').innerHTML = arDigit(mins) + ' <span class="unit">د</span>';
}

// Passenger counter
$('#inc').addEventListener('click', () => {
  pax = Math.min(120, pax + 1);
  $('#pax-count').textContent = arDigit(pax);
  $('#meta-occ').textContent = arDigit(Math.round(pax / 60 * 100)) + '٪';
  syncPax();
  if (cap?.vibrate) cap.vibrate('LIGHT');
});
$('#dec').addEventListener('click', () => {
  pax = Math.max(0, pax - 1);
  $('#pax-count').textContent = arDigit(pax);
  $('#meta-occ').textContent = arDigit(Math.round(pax / 60 * 100)) + '٪';
  syncPax();
  if (cap?.vibrate) cap.vibrate('LIGHT');
});
function syncPax() {
  if (!tripId || !token) return;
  fetch(API_BASE + '/api/driver/trip/passenger-count', {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+token },
    body: JSON.stringify({ trip_id: tripId, count: pax })
  }).catch(()=>{});
}

// Incident
$('#incident-btn').addEventListener('click', async () => {
  if (cap?.captureIncidentPhoto) {
    try {
      const photo = await cap.captureIncidentPhoto();
      if (token && photo?.dataUrl) {
        await fetch(API_BASE + '/api/driver/incident', {
          method: 'POST',
          headers: {'Content-Type':'application/json','Authorization':'Bearer '+token},
          body: JSON.stringify({ photo: photo.dataUrl, lat: lastPos?.latitude, lon: lastPos?.longitude })
        });
      }
      alert('تم الإبلاغ');
    } catch (_) {}
  } else {
    alert('الإبلاغ يتطلب التطبيق الأصلي. سيتم الإرسال نصياً.');
  }
});

// Boot
window.addEventListener('DOMContentLoaded', () => {
  if (token && user) { showTrip(); setupGPS(); } else showLogin();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/driver/service-worker.js').catch(()=>{});
});
</script>
</body>
</html>

# DamascusTransit — nginx 1.27 (Docker reverse proxy + static)
# Requires nginx-quic (the alpine-quic tag) or any nginx ≥1.25 built with --with-http_v3_module.
# Brotli is optional; gzip fallback always present.

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept       on;
    use                epoll;
}

http {
    # ── MIME + log format ────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main escape=json
        '{ "ts":"$time_iso8601", "ip":"$remote_addr", "method":"$request_method", '
        '  "path":"$uri", "status":$status, "bytes":$bytes_sent, '
        '  "rt_ms":$request_time, "ua":"$http_user_agent", "rid":"$request_id" }';
    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65s;
    keepalive_requests 1000;
    server_tokens      off;        # don't leak version
    client_max_body_size 8m;
    types_hash_max_size 2048;

    # ── Compression ──────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types  application/javascript application/json application/xml
                application/manifest+json application/vnd.api+json
                application/x-font-ttf application/font-woff
                font/woff2 image/svg+xml text/css text/plain text/xml;

    # Brotli — optional. Wrap in a conditional so the config loads even
    # without the module. The Docker image we use ships nginx-mod-http-brotli.
    # If your build lacks it, comment these four lines out.
    brotli              on;
    brotli_comp_level   5;
    brotli_static       on;
    brotli_types        application/javascript application/json application/xml
                        application/manifest+json image/svg+xml text/css text/plain;

    # ── HTTP/3 (QUIC) ─────────────────────────────────────────────────────
    # The server block below listens on 443 with both H2 + H3. Clients that
    # know how to upgrade (Chrome, Firefox, Safari recent) get H3 immediately;
    # others fall back to H2 / H1.1.
    http3                       on;
    http3_hq                    off;
    quic_retry                  on;
    quic_gso                    on;
    ssl_early_data              on;

    # ── TLS hygiene ──────────────────────────────────────────────────────
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers  on;
    ssl_ciphers                ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_timeout        1d;
    ssl_session_cache          shared:SSL:50m;
    ssl_session_tickets        off;
    ssl_stapling               on;
    ssl_stapling_verify        on;

    # ── Rate limit (defence in depth — the FastAPI layer also limits) ────
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=api_login:10m   rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # ── Upstream ─────────────────────────────────────────────────────────
    upstream backend {
        server api:8000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect + ACME ─────────────────────────────────────
    server {
        listen      80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location = /healthz { return 200 "ok\n"; access_log off; }

        location / { return 301 https://$host$request_uri; }
    }

    # ── HTTPS / H2 / H3 ──────────────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2  on;
        listen 443 quic reuseport;
        listen [::]:443 quic reuseport;

        server_name _;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Advertise H3 availability — clients use Alt-Svc to upgrade.
        add_header Alt-Svc 'h3=":443"; ma=86400' always;

        # ── Security headers (mirror vercel.json for parity) ─────────────
        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options     "nosniff" always;
        add_header X-Frame-Options            "DENY" always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy         "camera=(self), microphone=(), geolocation=(self), payment=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;

        # Per-IP guards
        limit_conn conn_per_ip 50;

        # ── Static assets ────────────────────────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        location ~* \.(?:css|js|svg|png|jpg|jpeg|webp|woff2|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        location = /healthz { return 200 "ok\n"; access_log off; }

        # ── API proxy ────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_general burst=40 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-Id      $request_id;
            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    60s;
            proxy_buffering       off;   # required for SSE on /api/stream

            # No-store for API responses; CDN must not cache.
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }

        location = /api/auth/login {
            limit_req zone=api_login burst=2 nodelay;
            proxy_pass http://backend;
        }

        # ── Web app fallback (SPA-style for PWAs) ────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}

# Step 97 — repository label taxonomy.
#
# Apply this with `npx github-label-sync --access-token $GH_TOKEN --labels .github/labels.yml actuatorsos/SyrianTransitSystem`
# or with the github-label-sync GitHub App. Re-applying is idempotent.
#
# Three axes: kind, area, priority. Plus a small handful of contributor signals.

- name: good first issue
  color: 7057ff
  description: Self-contained, well-scoped work suitable for a first PR.
- name: help wanted
  color: 008672
  description: Owner welcomes outside contribution on this.
- name: needs design
  color: d4c5f9
  description: Awaiting UX direction before implementation can start.

# ── kind ─────────────────────────────────────────────────────────────────
- name: kind/feature
  color: 1d76db
  description: New user-visible capability.
- name: kind/bug
  color: d73a4a
  description: Something is broken.
- name: kind/security
  color: ee0701
  description: Vulnerability or hardening work.
- name: kind/perf
  color: fbca04
  description: Performance, latency, or efficiency improvement.
- name: kind/docs
  color: 0e8a16
  description: Documentation only.
- name: kind/test
  color: c2e0c6
  description: Test coverage or test infra.
- name: kind/refactor
  color: bfd4f2
  description: No behaviour change.
- name: kind/chore
  color: bfdadc
  description: Repo maintenance.


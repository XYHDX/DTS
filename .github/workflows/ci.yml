name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # -------------------------------------------------------------------------
  # Stage 1 — Lint
  # -------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.15.18

      - name: Check style (ruff format)
        run: ruff format --check api/ lib/

      - name: Check lint (ruff check)
        run: ruff check api/ lib/

  # -------------------------------------------------------------------------
  # Stage 2 — Tests + Coverage
  # -------------------------------------------------------------------------
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: http://mock-supabase.local
      SUPABASE_KEY: mock-key
      SUPABASE_SERVICE_KEY: mock-service-key
      SUPABASE_ANON_KEY: mock-anon-key
      JWT_SECRET: ci-test-secret-do-not-use-in-prod-xxxxxxxxxx
      TRACCAR_WEBHOOK_SECRET: ci-test-traccar-secret-do-not-use-in-prod
      ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt uvicorn pytest pytest-cov pytest-asyncio httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short --timeout=30

      - name: Run coverage
        run: |
          pytest tests/ \
            --cov=api \
            --cov=lib \
            --cov-report=term \
            --cov-fail-under=50 \
            --timeout=30

  # -------------------------------------------------------------------------
  # Stage 3 — API Contract Validation
  # -------------------------------------------------------------------------
  api-contract:
    name: API Contract Validation
    runs-on: ubuntu-latest
    needs: [lint, test]
    env:
      SUPABASE_URL: http://mock-supabase.local
      SUPABASE_KEY: mock-key
      SUPABASE_SERVICE_KEY: mock-service-key
      SUPABASE_ANON_KEY: mock-anon-key
      JWT_SECRET: ci-test-secret-do-not-use-in-prod-xxxxxxxxxx
      TRACCAR_WEBHOOK_SECRET: ci-test-traccar-secret-do-not-use-in-prod
      ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt uvicorn pytest httpx

      - name: Validate all 26 API endpoint contracts
        run: pytest tests/test_api_contract.py -v --tb=short --timeout=30

  # -------------------------------------------------------------------------
  # Stage 4a — Map Tile Canary (workerUrl regression guard)
  # DAM-451: asserts hero map and app maps actually issue tile requests.
  # If workerUrl is removed or the CDN bundle path drifts, the canvas still
  # renders but no tiles load — this job catches that silently-blank state.
  # -------------------------------------------------------------------------
  map-tile-canary:
    name: Map Tile Canary
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: npm install --save-dev @playwright/test

      - name: Install Chromium browser
        run: npx playwright install --with-deps chromium

      - name: Run map tile canary tests
        run: |
          npx playwright test tests/test_hero_map_tiles.spec.js --reporter=list
        timeout-minutes: 5

  # -------------------------------------------------------------------------
  # Stage 4 — Docker Smoke Test
  # -------------------------------------------------------------------------
  docker-smoke:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v5

      - name: Build and start containers
        run: |
          docker compose up --build -d
        env:
          SUPABASE_URL: http://127.0.0.1:9999
          SUPABASE_KEY: mock-key
          SUPABASE_SERVICE_KEY: mock-service-key
          SUPABASE_ANON_KEY: mock-anon-key
          JWT_SECRET: ci-test-secret-do-not-use-in-prod-xxxxxxxxxx
          TRACCAR_WEBHOOK_SECRET: ci-test-traccar-secret-do-not-use-in-prod
          ALLOWED_ORIGINS: http://localhost:3000

      - name: Wait for API to be ready
        run: |
          echo "Waiting 15 seconds for API startup..."
          sleep 15
          docker compose ps

      - name: Smoke test — /api/health returns 200
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/health)
          echo "Health status: $status"
          if [ "$status" != "200" ]; then
            echo "FAIL: /api/health returned $status"
            docker compose logs
            exit 1
          fi
          echo "PASS: /api/health returned 200"

      - name: Smoke test — /api/vehicles returns JSON array or error envelope
        run: |
          response=$(curl -s --max-time 20 http://localhost:8000/api/vehicles?operator=damascus)
          echo "Vehicles response: $response"
          # Accept array [] or error {"detail":"..."} — both are valid JSON
          echo "$response" | python3 -c "import json,sys; json.load(sys.stdin); print('PASS: /api/vehicles returned valid JSON')"

      - name: Smoke test — /api/stream responds (SSE or JSON error)
        run: |
          # /api/stream is Server-Sent Events: on success it returns HTTP 200
          # and HOLDS THE CONNECTION OPEN, streaming events. A client-side
          # timeout is therefore the EXPECTED healthy outcome — not a failure.
          # We only need to confirm the endpoint exists and responds; we read
          # the status line with a short timeout and accept:
          #   200      → SSE stream opened (healthy)
          #   28/000   → curl timed out mid-stream = SSE held open (healthy)
          #   400/500  → JSON error envelope (endpoint exists; no DB in CI)
          # Only a 404 (route missing) is a real failure.
          set +e
          status=$(curl -s -o /tmp/stream_body -w "%{http_code}" --max-time 8 \
            "http://localhost:8000/api/stream?operator=damascus")
          rc=$?
          set -e
          echo "Stream status: $status (curl rc=$rc)"
          if [ "$status" = "200" ] || [ "$rc" = "28" ] || [ "$status" = "000" ]; then
            echo "PASS: /api/stream opened an SSE connection (held open / streamed)"
          elif [ "$status" = "400" ] || [ "$status" = "500" ] || [ "$status" = "503" ]; then
            echo "PASS: /api/stream returned $status — endpoint exists (no real DB in CI)"
          else
            echo "FAIL: /api/stream returned unexpected status $status (rc=$rc)"
            docker compose logs
            exit 1
          fi

      - name: Tear down
        if: always()
        run: docker compose down

  # -------------------------------------------------------------------------
  # Stage 5 — Auto-deploy (main branch only)
  # -------------------------------------------------------------------------
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [api-contract, docker-smoke, map-tile-canary]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v5

      - name: Deploy to Vercel (production) — or defer to Vercel Git integration
        run: |
          # This repo may deploy two ways:
          #  (a) Vercel's native Git integration (auto-deploys on push to main), or
          #  (b) this GitHub Action, when VERCEL_TOKEN is configured as a secret.
          # If no token is set we assume (a) and skip gracefully so CI stays green.
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not set — deployment is handled by Vercel's Git"
            echo "integration. Nothing to do here. (Set VERCEL_TOKEN/ORG_ID/"
            echo "PROJECT_ID secrets to deploy from CI instead.)"
            exit 0
          fi
          npm install -g vercel
          vercel --prod --yes --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # -------------------------------------------------------------------------
  # Stage 6 — Post-deploy Production Smoke Tests
  # -------------------------------------------------------------------------
  smoke-test:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install smoke test dependencies
        run: pip install pytest httpx websockets

      - name: Run production smoke tests (only when credentials are configured)
        run: |
          if [ -z "$SMOKE_ADMIN_EMAIL" ] || [ -z "$SMOKE_ADMIN_PASSWORD" ]; then
            echo "SMOKE_ADMIN_* secrets not set — skipping production smoke tests."
            echo "(Configure SMOKE_ADMIN_EMAIL/PASSWORD to enable them.)"
            exit 0
          fi
          sleep 20  # let the Vercel deployment stabilise
          pytest tests/smoke_test_production.py -v --tb=short
        env:
          SMOKE_BASE_URL: https://syrian-transit-system.vercel.app
          SMOKE_ADMIN_EMAIL: ${{ secrets.SMOKE_ADMIN_EMAIL }}
          SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}

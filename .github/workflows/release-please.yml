name: Release Please

on:
  # Manual dispatch only — set up branch protection / GITHUB_TOKEN PR perms
  # in repo settings before re-enabling the automatic push trigger:
  #   Settings → Actions → General → Workflow permissions:
  #     "Read and write permissions" + "Allow GitHub Actions to create and
  #     approve pull requests".
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    # Make the job non-blocking so a misconfigured token / branch rule
    # doesn't fail the whole CI dashboard. The release PR is still created
    # when permissions are right.
    continue-on-error: true
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          release-type: simple
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    # If the repo setting "Allow GitHub Actions to create and approve pull
    # requests" is OFF, the bot cannot open its release PR. That is a
    # repo-level toggle (Settings → Actions → General → Workflow
    # permissions), not something the workflow can grant — so we don't let
    # that block the commit's overall check status.
    continue-on-error: true
    steps:
      # Manifest mode: the release-type lives inside the config file's
      # "packages" map, so it must NOT also be passed as an action input
      # (v4 rejects the combination). See .github/release-please-config.json.
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

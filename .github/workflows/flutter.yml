name: Flutter CI

on:
  push:
    branches: [main]
    paths: ['flutter_app/**', '.github/workflows/flutter.yml']
  pull_request:
    branches: [main]
    paths: ['flutter_app/**', '.github/workflows/flutter.yml']

defaults:
  run:
    working-directory: flutter_app

jobs:
  analyze-and-test:
    name: Analyze + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true
      - run: flutter --version
      - run: flutter pub get
      - run: flutter analyze --fatal-infos
      - run: flutter test --reporter expanded --coverage
      - uses: codecov/codecov-action@v4
        if: success() && env.CODECOV_TOKEN != ''
        with:
          files: flutter_app/coverage/lcov.info
          flags: flutter
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build-android-debug:
    name: Android debug APK
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: '17' }
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true

      # Step 43 — gradle + AGP caches.
      # flutter-action already caches the pub cache; gradle is the second-biggest
      # CI tax (8–12 min cold, ~90 s warm). Two hash keys so a partial change still
      # gets a useful restore.
      - name: Cache Gradle wrapper + caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            flutter_app/android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('flutter_app/android/**/*.gradle*', 'flutter_app/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Android SDK packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/build-cache
            /usr/local/lib/android/sdk/build-tools
          key: android-sdk-${{ runner.os }}-${{ hashFiles('flutter_app/android/build.gradle', 'flutter_app/android/app/build.gradle') }}

      - run: flutter pub get
      - run: flutter build apk --debug --dart-define=API_BASE=https://example.invalid
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: flutter_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

name: Commit style

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  pr-title:
    name: Conventional PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            test
            chore
            perf
            build
            ci
            revert
            security
            deps
          requireScope: false
          subjectPattern: ^[a-z؀-ۿ].+$
          subjectPatternError: |
            The PR title subject must start with a lower-case letter or an Arabic letter
            (Conventional Commits convention). Example:
                feat(passenger): add ScheduleScreen with claude design
                deps(python): bump fastapi 0.115 → 0.136
          validateSingleCommit: false

  commit-messages:
    name: Commits follow Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: '.commitlintrc.json'

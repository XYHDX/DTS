name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 02:00 UTC
    - cron: "0 2 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dependency-audit:
    name: Dependency CVE Audit (pip-audit)
    runs-on: ubuntu-latest
    # Report-only: pip-audit findings are useful signal but the right place
    # to action them is Dependabot PRs, not a hard CI gate that blocks every
    # unrelated commit. The previous --strict flag failed the build on any
    # CVE regardless of severity or whether a fix existed. CodeQL handles
    # the blocking side for actual code-level issues.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit (non-blocking)
        run: pip-audit -r requirements.txt || echo "::warning::pip-audit found CVEs — triage via Dependabot PRs"

  npm-audit:
    name: Dependency CVE Audit (npm — mobile/Capacitor)
    runs-on: ubuntu-latest
    # Capacitor's transitive Android/iOS toolchains routinely surface
    # moderate/high CVEs in upstream native deps we don't control.
    # Run report-only so we see them in the dashboard without blocking deploys;
    # we triage critical ones via Dependabot.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate lockfile if missing
        working-directory: mobile
        run: |
          if [ ! -f package-lock.json ]; then
            echo "No package-lock.json — generating one for audit purposes."
            npm install --package-lock-only --no-audit --no-fund
          fi
      - name: npm audit (Capacitor) — report-only, fail only on CRITICAL
        working-directory: mobile
        run: |
          # Critical CVEs are blockers; high+moderate are reported as warnings.
          npm audit --audit-level=critical || echo "::warning::npm audit found findings — see report above."

  flutter-deps:
    name: Dependency Check (Flutter pub outdated)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true
      - working-directory: flutter_app
        run: |
          flutter pub get
          # Report-only — does not fail CI. CVEs come via Dependabot.
          flutter pub outdated --no-dev-dependencies --no-dependency-overrides || true

  secrets-scan:
    name: Secrets Detection (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # full history for commit-history scan

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 02:00 UTC
    - cron: "0 2 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dependency-audit:
    name: Dependency CVE Audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit -r requirements.txt --strict

  # (2026-06-11) npm-audit job removed: the Capacitor wrapper (mobile/) was
  # archived — Flutter (flutter_app/) is the single official mobile app and is
  # covered by the flutter-deps job below.

  flutter-deps:
    name: Dependency Check (Flutter pub outdated)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true
      - working-directory: flutter_app
        run: |
          flutter pub get
          # Report-only — does not fail CI. CVEs come via Dependabot.
          flutter pub outdated --no-dev-dependencies --no-dependency-overrides || true

  secrets-scan:
    name: Secrets Detection (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full history for commit-history scan

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Damascus"
    open-pull-requests-limit: 5
    labels: ["dependencies", "backend"]
    commit-message:
      prefix: "deps(python)"

  - package-ecosystem: "pub"
    directory: "/flutter_app"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "flutter"]
    commit-message:
      prefix: "deps(flutter)"

  # (2026-06-11) Capacitor npm entry removed — mobile/ was archived;
  # flutter_app/ is the single official mobile app (covered by "pub" above).

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "deps(ci)"

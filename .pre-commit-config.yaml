# Pre-commit hooks for DamascusTransit.
# Install once:   pip install pre-commit && pre-commit install
# Run on demand:  pre-commit run --all-files
#
# CI also runs this in .github/workflows/ci.yml so a broken push is caught
# centrally even if a contributor skips the local hook.

repos:
  # ---- Generic hygiene ------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
        exclude: ^source/\.github/workflows/.*$  # GH Actions tags differ from yaml spec
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=512']
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  # ---- Python (FastAPI backend) --------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ['--fix']
        files: ^(api|lib|tests)/.*\.py$
      - id: ruff-format
        files: ^(api|lib|tests)/.*\.py$

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: ['-q', '-x', 'tests']
        files: ^(api|lib)/.*\.py$

  # ---- Dart / Flutter -------------------------------------------------------
  # `dart format` and `flutter analyze` are run via a small wrapper because
  # pre-commit-hooks lacks a first-party Flutter integration.
  - repo: local
    hooks:
      - id: dart-format
        name: dart format (flutter_app)
        entry: bash -c 'cd flutter_app && dart format --output=none --set-exit-if-changed lib test'
        language: system
        files: ^flutter_app/.*\.dart$
        pass_filenames: false

      - id: flutter-analyze
        name: flutter analyze (flutter_app)
        entry: bash -c 'cd flutter_app && flutter analyze --no-fatal-infos'
        language: system
        files: ^flutter_app/(lib|test)/.*\.dart$
        pass_filenames: false

  # ---- Web (HTML/CSS/JS) ---------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: ^public/.*\.(css|js|html|json|md)$
        args: ['--write']
        exclude: ^public/lib/.*\.min\.(js|css)$

  # ---- Secrets -------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.20.1
    hooks:
      - id: gitleaks
        args: ['--config=.gitleaks.toml']

  # ---- Conventional Commits (commit-msg hook) ------------------------------
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: ['feat', 'fix', 'docs', 'style', 'refactor', 'test', 'chore',
               'perf', 'build', 'ci', 'revert', 'security', 'deps']

name: damascus_transit
description: DamascusTransit — passenger & driver app (Flutter).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State + DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.1.4

  # Networking
  dio: ^5.4.3+1
  retrofit: ^4.1.0
  pretty_dio_logger: ^1.4.0

  # JSON
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Realtime
  flutter_client_sse: ^2.0.1

  # Map
  flutter_map: ^7.0.1
  latlong2: ^0.9.1

  # Location
  geolocator: ^12.0.0
  # Production driver background-location plugin. Free for OSS use under the
  # vendor licence; commercial-licence required for closed-source apps.
  flutter_background_geolocation: ^4.16.0

  # Biometrics
  local_auth: ^2.2.0

  # Push (Firebase)
  firebase_core: ^3.1.1
  firebase_messaging: ^15.0.2

  # Crash + perf reporting
  sentry_flutter: ^8.6.0

  # Other utilities
  intl: ^0.19.0
  url_launcher: ^6.3.0
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.10
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  retrofit_generator: ^8.1.0
  drift_dev: ^2.18.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/

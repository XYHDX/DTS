# Grafana dashboard provider — loads JSON dashboards from disk. Phase S7.2.
apiVersion: 1

providers:
  - name: "DamascusTransit"
    orgId: 1
    folder: "Damascus Transit"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false

# Mosquitto broker — DEV configuration for Phase S2.2 (Scale_100k_Roadmap.md).
#
# This is a development/pilot broker. For production (5,000+ sustained
# connections, per ADR-005) migrate to EMQX or HiveMQ with per-device X.509
# client certificates as described in firmware/SPEC.md.

# MQTT over TCP
listener 1883
# MQTT over WebSockets (handy for browser-based debugging dashboards)
listener 9001
protocol websockets

# DEV ONLY: anonymous access. Production MUST use per-device certificates /
# username-password and disable anonymous access.
allow_anonymous true

persistence true
persistence_location /mosquitto/data/
autosave_interval 60

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
